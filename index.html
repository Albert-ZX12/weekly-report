<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周报系统</title>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f9f8f5;
    --border: #e2e0d8;
    --border2: #ccc9be;
    --text: #1a1917;
    --text2: #5a5751;
    --text3: #9a9690;
    --accent: #2d6a4f;
    --accent-light: #e8f5ee;
    --accent-text: #1b4332;
    --danger: #c0392b;
    --danger-light: #fdf0ef;
    --warn: #d68910;
    --warn-light: #fef9ec;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }

  /* ---- AUTH ---- */
  #auth-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 60%, #40916c 100%);
  }
  .auth-box {
    background: var(--surface); border-radius: 16px; padding: 40px 36px;
    width: 360px; box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  }
  .auth-logo { font-size: 28px; font-weight: 700; color: var(--accent); margin-bottom: 6px; letter-spacing: -0.5px; }
  .auth-sub { color: var(--text3); font-size: 13px; margin-bottom: 28px; }
  .auth-box label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 4px; margin-top: 14px; }
  .auth-box input {
    width: 100%; padding: 9px 12px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-size: 14px; outline: none; background: var(--surface2);
    transition: border-color 0.15s;
  }
  .auth-box input:focus { border-color: var(--accent); background: #fff; }
  .btn-primary {
    width: 100%; padding: 10px; background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
    cursor: pointer; margin-top: 20px; transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--accent-text); }
  .auth-err { color: var(--danger); font-size: 12px; margin-top: 8px; min-height: 16px; }
  .auth-tabs { display: flex; gap: 0; margin-bottom: 20px; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); }
  .auth-tab { flex: 1; padding: 8px; text-align: center; cursor: pointer; font-size: 13px; background: var(--surface2); color: var(--text2); border: none; transition: all 0.15s; }
  .auth-tab.active { background: var(--accent); color: #fff; font-weight: 600; }

  /* ---- LAYOUT ---- */
  #app { display: none; min-height: 100vh; }
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; height: 56px; gap: 16px;
    box-shadow: var(--shadow);
  }
  .topbar-logo { font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
  .topbar-spacer { flex: 1; }
  .user-badge {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface2); font-size: 13px; color: var(--text2);
    transition: border-color 0.15s;
  }
  .user-badge:hover { border-color: var(--border2); }
  .avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--accent-light); color: var(--accent-text); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
  .nav-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; font-size: 13px; cursor: pointer; color: var(--text2);
    transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--surface2); }
  .nav-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .main { max-width: 900px; margin: 0 auto; padding: 28px 20px; }

  /* ---- VIEWS ---- */
  .view { display: none; }
  .view.active { display: block; }

  /* ---- WEEK PICKER ---- */
  .week-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .week-nav { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text2); font-size: 16px; transition: all 0.15s; }
  .week-nav:hover { border-color: var(--accent); color: var(--accent); }
  .week-label { font-size: 16px; font-weight: 600; color: var(--text); }
  .week-sub { font-size: 12px; color: var(--text3); }

  /* ---- REPORT FORM ---- */
  .report-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 24px; margin-bottom: 16px; }
  .section-title { font-size: 13px; font-weight: 600; color: var(--accent-text); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .section-title::before { content: ''; display: inline-block; width: 3px; height: 14px; background: var(--accent); border-radius: 2px; }

  .task-list { display: flex; flex-direction: column; gap: 8px; }
  .task-row { display: flex; align-items: flex-start; gap: 8px; }
  .task-row textarea {
    flex: 1; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-size: 13px; resize: vertical; min-height: 40px;
    font-family: inherit; outline: none; background: var(--surface2); color: var(--text); transition: border-color 0.15s;
  }
  .task-row textarea:focus { border-color: var(--accent); background: #fff; }
  .task-status {
    padding: 5px 8px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 12px; cursor: pointer; outline: none; background: var(--surface2); color: var(--text2);
    white-space: nowrap; height: 36px;
  }
  .del-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border: none; background: transparent; cursor: pointer; color: var(--text3); font-size: 16px; border-radius: 4px; flex-shrink: 0; margin-top: 4px; }
  .del-btn:hover { color: var(--danger); background: var(--danger-light); }
  .add-btn { display: flex; align-items: center; gap: 4px; padding: 7px 12px; border: 1px dashed var(--border2); border-radius: var(--radius-sm); background: transparent; cursor: pointer; font-size: 13px; color: var(--text3); margin-top: 8px; transition: all 0.15s; }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  .summary-area {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 13px; min-height: 80px; resize: vertical; font-family: inherit; outline: none;
    background: var(--surface2); color: var(--text); line-height: 1.7; transition: border-color 0.15s;
  }
  .summary-area:focus { border-color: var(--accent); background: #fff; }

  .save-bar { display: flex; align-items: center; gap: 10px; justify-content: flex-end; margin-top: 8px; }
  .btn-save { padding: 9px 22px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn-save:hover { background: var(--accent-text); }
  .save-tip { font-size: 12px; color: var(--text3); }

  /* ---- STATUS BADGES ---- */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge-done { background: #e8f5ee; color: #1b4332; }
  .badge-progress { background: #fef9ec; color: #7d5a00; }
  .badge-todo { background: #eff3fb; color: #1a4480; }
  .badge-blocked { background: #fdf0ef; color: #7f1d1d; }

  /* ---- HISTORY ---- */
  .history-grid { display: flex; flex-direction: column; gap: 12px; }
  .history-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 20px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
    display: flex; align-items: center; gap: 16px;
  }
  .history-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(45,106,79,0.08); }
  .history-week { font-size: 14px; font-weight: 600; color: var(--text); }
  .history-dates { font-size: 12px; color: var(--text3); }
  .history-stats { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
  .stat-pill { display: flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; border: 1px solid; }
  .stat-done { background: #e8f5ee; color: #1b4332; border-color: #b7e0c8; }
  .stat-progress { background: #fef9ec; color: #7d5a00; border-color: #fad781; }
  .stat-todo { background: #eff3fb; color: #1a4480; border-color: #b8cef0; }

  /* ---- DETAIL VIEW ---- */
  .back-btn { display: flex; align-items: center; gap: 6px; color: var(--text2); cursor: pointer; font-size: 13px; margin-bottom: 20px; padding: 6px 0; border: none; background: transparent; }
  .back-btn:hover { color: var(--accent); }
  .readonly-task { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .readonly-task:last-child { border-bottom: none; }
  .readonly-task-text { flex: 1; font-size: 13px; color: var(--text); }

  /* ---- ADMIN VIEW ---- */
  .admin-filter { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .admin-filter select, .admin-filter input { padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; background: var(--surface); outline: none; color: var(--text); }
  .admin-filter select:focus, .admin-filter input:focus { border-color: var(--accent); }
  .admin-table { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .admin-table table { width: 100%; border-collapse: collapse; }
  .admin-table th { padding: 10px 14px; font-size: 12px; font-weight: 600; text-align: left; background: var(--surface2); color: var(--text3); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.4px; }
  .admin-table td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .admin-table tr:last-child td { border-bottom: none; }
  .admin-table tr:hover td { background: var(--surface2); }
  .admin-table td a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .admin-table td a:hover { text-decoration: underline; }

  /* ---- USER MGMT ---- */
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .page-title { font-size: 20px; font-weight: 700; color: var(--text); }
  .btn-sm { padding: 6px 14px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; font-weight: 500; transition: all 0.15s; }
  .btn-outline { border: 1px solid var(--border); background: transparent; color: var(--text2); }
  .btn-outline:hover { border-color: var(--border2); background: var(--surface2); }
  .btn-accent { border: none; background: var(--accent); color: #fff; }
  .btn-accent:hover { background: var(--accent-text); }
  .btn-danger { border: none; background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #a93226; }

  /* ---- MODAL ---- */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: none; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 12px; padding: 28px; width: 380px; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .modal label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; outline: none; }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  .empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty-title { font-size: 15px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--accent); color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; z-index: 300; opacity: 0; transform: translateY(10px); transition: all 0.25s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* role indicator */
  .role-tag { font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
  .role-admin { background: #e8f5ee; color: #1b4332; }
  .role-member { background: #eff3fb; color: #1a4480; }

  @media (max-width: 600px) {
    .main { padding: 16px 12px; }
    .topbar { padding: 0 12px; }
    .history-stats { display: none; }
    .admin-filter { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">📋 周报系统</div>
    <div class="auth-sub">团队周报填写与管理平台</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">登录</button>
      <button class="auth-tab" onclick="switchAuthTab('register')" id="reg-tab">注册</button>
    </div>
    <div id="login-form">
      <label>用户名</label>
      <input type="text" id="login-user" placeholder="请输入用户名" />
      <label>密码</label>
      <input type="password" id="login-pass" placeholder="请输入密码" />
      <div class="auth-err" id="login-err"></div>
      <button class="btn-primary" onclick="doLogin()">登 录</button>
    </div>
    <div id="register-form" style="display:none">
      <label>用户名</label>
      <input type="text" id="reg-user" placeholder="3-12位字母数字" />
      <label>姓名（显示名）</label>
      <input type="text" id="reg-name" placeholder="如：张三" />
      <label>密码</label>
      <input type="password" id="reg-pass" placeholder="至少6位" />
      <div class="auth-err" id="reg-err"></div>
      <button class="btn-primary" onclick="doRegister()">注 册</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">📋 周报系统</div>
    <div style="display:flex;gap:6px;margin-left:16px">
      <button class="nav-btn active" onclick="showView('my-report')" id="nav-my">我的周报</button>
      <button class="nav-btn" onclick="showView('history')" id="nav-history">历史记录</button>
      <button class="nav-btn" onclick="showView('admin')" id="nav-admin" style="display:none">团队总览</button>
      <button class="nav-btn" onclick="showView('users')" id="nav-users" style="display:none">成员管理</button>
    </div>
    <div class="topbar-spacer"></div>
    <div class="user-badge" onclick="doLogout()">
      <div class="avatar" id="top-avatar">U</div>
      <span id="top-username">用户</span>
      <span style="color:var(--text3);font-size:11px">退出</span>
    </div>
  </div>

  <div class="main">

    <!-- MY REPORT VIEW -->
    <div class="view active" id="view-my-report">
      <div class="week-header">
        <button class="week-nav" onclick="changeWeek(-1)">‹</button>
        <div>
          <div class="week-label" id="week-label-text">第 XX 周</div>
          <div class="week-sub" id="week-date-range">日期范围</div>
        </div>
        <button class="week-nav" onclick="changeWeek(1)">›</button>
        <div id="current-week-badge" style="display:none;margin-left:4px;background:var(--accent-light);color:var(--accent-text);padding:3px 10px;border-radius:10px;font-size:12px;font-weight:600">本周</div>
      </div>

      <!-- Completed tasks -->
      <div class="report-card">
        <div class="section-title">本周完成事项</div>
        <div class="task-list" id="done-list"></div>
        <button class="add-btn" onclick="addTask('done')">＋ 添加完成事项</button>
      </div>

      <!-- In-progress tasks -->
      <div class="report-card">
        <div class="section-title">进行中事项</div>
        <div class="task-list" id="progress-list"></div>
        <button class="add-btn" onclick="addTask('progress')">＋ 添加进行中事项</button>
      </div>

      <!-- Next week plan -->
      <div class="report-card">
        <div class="section-title">下周计划</div>
        <div class="task-list" id="todo-list"></div>
        <button class="add-btn" onclick="addTask('todo')">＋ 添加下周计划</button>
      </div>

      <!-- Summary -->
      <div class="report-card">
        <div class="section-title">总结与备注</div>
        <textarea class="summary-area" id="summary-text" placeholder="本周工作总结、遇到的问题、需要协调的事项..."></textarea>
      </div>

      <div class="save-bar">
        <span class="save-tip" id="save-tip"></span>
        <button class="btn-save" onclick="saveReport()">保存周报</button>
      </div>
    </div>

    <!-- HISTORY VIEW -->
    <div class="view" id="view-history">
      <div class="section-head">
        <div class="page-title">历史周报</div>
      </div>
      <div id="history-list" class="history-grid"></div>
    </div>

    <!-- HISTORY DETAIL -->
    <div class="view" id="view-detail">
      <button class="back-btn" onclick="showView('history')">← 返回列表</button>
      <div id="detail-content"></div>
    </div>

    <!-- ADMIN VIEW -->
    <div class="view" id="view-admin">
      <div class="section-head">
        <div class="page-title">团队周报总览</div>
      </div>
      <div class="admin-filter">
        <select id="admin-week-sel" onchange="renderAdmin()"></select>
        <input type="text" id="admin-search" placeholder="搜索成员..." oninput="renderAdmin()" style="width:160px">
      </div>
      <div class="admin-table" id="admin-table-wrap"></div>
    </div>

    <!-- USERS VIEW -->
    <div class="view" id="view-users">
      <div class="section-head">
        <div class="page-title">成员管理</div>
        <button class="btn-sm btn-accent" onclick="openAddUser()">＋ 添加成员</button>
      </div>
      <div class="admin-table" id="users-table-wrap"></div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal" id="modal-body"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============ DATA LAYER ============
const DB = {
  get(k) { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) { console.error('存储失败', e); } },
  del(k) { try { localStorage.removeItem(k); } catch(e) {} }
};

// 安全的密码编码（兼容中文和特殊字符）
function encodePass(p) {
  try { return btoa(unescape(encodeURIComponent(p))); } catch(e) { return btoa(p); }
}
function checkPass(input, stored) {
  try { return encodePass(input) === stored; } catch(e) { return false; }
}

function getUsers() { return DB.get('wr_users') || []; }
function saveUsers(u) { DB.set('wr_users', u); }
function getReports() { return DB.get('wr_reports') || []; }
function saveReports(r) { DB.set('wr_reports', r); }

// Init admin account if first run
(function init() {
  try {
    let users = getUsers();
    if (!users.length) {
      users = [{ username: 'admin', name: '管理员', password: encodePass('admin123'), role: 'admin' }];
      saveUsers(users);
    } else {
      // 兼容旧版本 btoa 存储的密码（直接用btoa('admin123')存的）
      // 不做迁移，保持现状
    }
  } catch(e) { console.error('初始化失败', e); }
})();

let currentUser = null;
let currentWeekOffset = 0; // 0 = this week

// ============ AUTH ============
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
  document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
}

function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const users = getUsers();
  const user = users.find(x => x.username === u && checkPass(p, x.password));
  if (!user) { document.getElementById('login-err').textContent = '用户名或密码错误'; return; }
  currentUser = user;
  DB.set('wr_session', user.username);
  enterApp();
}

function doRegister() {
  const u = document.getElementById('reg-user').value.trim();
  const name = document.getElementById('reg-name').value.trim();
  const p = document.getElementById('reg-pass').value;
  const err = document.getElementById('reg-err');
  if (!u || !/^[a-zA-Z0-9_]{3,12}$/.test(u)) { err.textContent = '用户名3-12位字母数字下划线'; return; }
  if (!name) { err.textContent = '请填写显示名'; return; }
  if (p.length < 6) { err.textContent = '密码至少6位'; return; }
  const users = getUsers();
  if (users.find(x => x.username === u)) { err.textContent = '用户名已存在'; return; }
  users.push({ username: u, name, password: encodePass(p), role: 'member' });
  saveUsers(users);
  err.textContent = '';
  showToast('注册成功，请登录');
  switchAuthTab('login');
  document.getElementById('login-user').value = u;
}

function doLogout() {
  currentUser = null; DB.del('wr_session');
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = '';
}

function enterApp() {
  try {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('top-username').textContent = currentUser.name;
    document.getElementById('top-avatar').textContent = currentUser.name.slice(0,1);
    if (currentUser.role === 'admin') {
      document.getElementById('nav-admin').style.display = '';
      document.getElementById('nav-users').style.display = '';
    }
    currentWeekOffset = 0;
    showView('my-report');
  } catch(e) {
    console.error('进入应用失败', e);
    alert('页面加载失败，请刷新后重试');
  }
}

// Auto-login from session
window.addEventListener('DOMContentLoaded', () => {
  try {
    const sess = DB.get('wr_session');
    if (sess) {
      const u = getUsers().find(x => x.username === sess);
      if (u) { currentUser = u; enterApp(); }
    }
  } catch(e) { console.error('自动登录失败', e); }
});

// ============ WEEK UTILS ============
function getWeekInfo(offset) {
  const now = new Date();
  const day = now.getDay() || 7;
  const mon = new Date(now);
  mon.setDate(now.getDate() - day + 1 + offset * 7);
  mon.setHours(0,0,0,0);
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  const year = mon.getFullYear();
  const startOfYear = new Date(year, 0, 1);
  const weekNum = Math.ceil(((mon - startOfYear) / 86400000 + startOfYear.getDay() + 1) / 7);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  const isoKey = mon.toISOString().slice(0,10);
  return { mon, sun, weekNum, year, label: `${year} 年第 ${weekNum} 周`, range: `${fmt(mon)} ~ ${fmt(sun)}`, key: isoKey };
}

function getReportKey(username, weekKey) { return `${username}_${weekKey}`; }

// ============ NAVIGATION ============
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  const navMap = { 'my-report': 'nav-my', 'history': 'nav-history', 'admin': 'nav-admin', 'users': 'nav-users', 'detail': 'nav-history' };
  if (navMap[name]) { const el = document.getElementById(navMap[name]); if (el) el.classList.add('active'); }
  if (name === 'my-report') renderReport();
  if (name === 'history') renderHistory();
  if (name === 'admin') renderAdminWeekSel(), renderAdmin();
  if (name === 'users') renderUsers();
}

function changeWeek(d) { currentWeekOffset += d; renderReport(); }

// ============ REPORT FORM ============
let reportData = { done: [], progress: [], todo: [], summary: '' };

function renderReport() {
  const wi = getWeekInfo(currentWeekOffset);
  document.getElementById('week-label-text').textContent = wi.label;
  document.getElementById('week-date-range').textContent = wi.range;
  document.getElementById('current-week-badge').style.display = currentWeekOffset === 0 ? '' : 'none';

  const key = getReportKey(currentUser.username, wi.key);
  const saved = getReports().find(r => r.key === key);
  reportData = saved ? JSON.parse(JSON.stringify(saved)) : { key, username: currentUser.username, weekKey: wi.key, weekLabel: wi.label, weekRange: wi.range, done: [], progress: [], todo: [], summary: '' };

  renderList('done-list', reportData.done);
  renderList('progress-list', reportData.progress);
  renderList('todo-list', reportData.todo);
  document.getElementById('summary-text').value = reportData.summary || '';
  document.getElementById('save-tip').textContent = saved ? `上次保存: ${saved.savedAt || ''}` : '';
}

function renderList(containerId, items) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  items.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'task-row';
    row.innerHTML = `
      <textarea placeholder="事项描述...">${item.text || ''}</textarea>
      <select class="task-status">
        <option value="done" ${item.status==='done'?'selected':''}>✅ 已完成</option>
        <option value="progress" ${item.status==='progress'?'selected':''}>🔄 进行中</option>
        <option value="todo" ${item.status==='todo'?'selected':''}>📌 待办</option>
        <option value="blocked" ${item.status==='blocked'?'selected':''}>🚫 受阻</option>
      </select>
      <button class="del-btn" title="删除">×</button>`;
    row.querySelector('textarea').oninput = e => items[i].text = e.target.value;
    row.querySelector('select').onchange = e => items[i].status = e.target.value;
    row.querySelector('.del-btn').onclick = () => { items.splice(i, 1); renderList(containerId, items); };
    el.appendChild(row);
  });
}

function addTask(type) {
  const listMap = { done: reportData.done, progress: reportData.progress, todo: reportData.todo };
  const statusMap = { done: 'done', progress: 'progress', todo: 'todo' };
  listMap[type].push({ text: '', status: statusMap[type] });
  const idMap = { done: 'done-list', progress: 'progress-list', todo: 'todo-list' };
  renderList(idMap[type], listMap[type]);
  document.getElementById(idMap[type]).lastElementChild.querySelector('textarea').focus();
}

function saveReport() {
  reportData.summary = document.getElementById('summary-text').value;
  const wi = getWeekInfo(currentWeekOffset);
  reportData.key = getReportKey(currentUser.username, wi.key);
  reportData.username = currentUser.username;
  reportData.name = currentUser.name;
  reportData.weekKey = wi.key;
  reportData.weekLabel = wi.label;
  reportData.weekRange = wi.range;
  reportData.savedAt = new Date().toLocaleString('zh-CN', { hour12: false }).replace(/\//g,'-');
  const reports = getReports().filter(r => r.key !== reportData.key);
  reports.push(JSON.parse(JSON.stringify(reportData)));
  saveReports(reports);
  document.getElementById('save-tip').textContent = `上次保存: ${reportData.savedAt}`;
  showToast('周报保存成功 ✓');
}

// ============ HISTORY ============
function renderHistory() {
  const reports = getReports().filter(r => r.username === currentUser.username).sort((a,b) => b.weekKey.localeCompare(a.weekKey));
  const el = document.getElementById('history-list');
  if (!reports.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📄</div><div class="empty-title">暂无周报记录</div><div>填写并保存本周周报后，历史记录将显示在这里</div></div>`;
    return;
  }
  el.innerHTML = reports.map(r => {
    const done = r.done.filter(t=>t.status==='done').length + r.done.length;
    const prog = r.progress.length;
    const todo = r.todo.length;
    return `<div class="history-card" onclick="showDetail('${r.key}')">
      <div>
        <div class="history-week">${r.weekLabel}</div>
        <div class="history-dates">${r.weekRange}</div>
      </div>
      <div class="history-stats">
        ${r.done.length ? `<div class="stat-pill stat-done">✅ 完成 ${r.done.length}</div>` : ''}
        ${r.progress.length ? `<div class="stat-pill stat-progress">🔄 进行中 ${r.progress.length}</div>` : ''}
        ${r.todo.length ? `<div class="stat-pill stat-todo">📌 计划 ${r.todo.length}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function showDetail(key) {
  const r = getReports().find(x => x.key === key);
  if (!r) return;
  const renderSection = (title, items) => {
    if (!items || !items.length) return '';
    const statusMap = { done:'badge-done', progress:'badge-progress', todo:'badge-todo', blocked:'badge-blocked' };
    const statusLabel = { done:'已完成', progress:'进行中', todo:'待办', blocked:'受阻' };
    return `<div class="report-card">
      <div class="section-title">${title}</div>
      ${items.map(t=>`<div class="readonly-task">
        <span class="badge ${statusMap[t.status]||'badge-todo'}">${statusLabel[t.status]||'待办'}</span>
        <div class="readonly-task-text">${t.text||'（未填写）'}</div>
      </div>`).join('')}
    </div>`;
  };
  document.getElementById('detail-content').innerHTML = `
    <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:20px">
      <div class="page-title">${r.weekLabel}</div>
      <div style="color:var(--text3);font-size:13px">${r.weekRange}</div>
    </div>
    ${renderSection('本周完成事项', r.done)}
    ${renderSection('进行中事项', r.progress)}
    ${renderSection('下周计划', r.todo)}
    ${r.summary ? `<div class="report-card"><div class="section-title">总结与备注</div><div style="font-size:13px;color:var(--text);line-height:1.8;white-space:pre-wrap">${r.summary}</div></div>` : ''}
  `;
  showView('detail');
}

// ============ ADMIN ============
function renderAdminWeekSel() {
  const reports = getReports();
  const weeks = [...new Set(reports.map(r => r.weekKey))].sort().reverse();
  const sel = document.getElementById('admin-week-sel');
  const cur = sel.value;
  sel.innerHTML = weeks.map(w => `<option value="${w}" ${w===cur?'selected':''}>${w}</option>`).join('');
  if (!sel.value && weeks.length) sel.value = weeks[0];
}

function renderAdmin() {
  const weekKey = document.getElementById('admin-week-sel').value;
  const search = document.getElementById('admin-search').value.trim().toLowerCase();
  const reports = getReports().filter(r => r.weekKey === weekKey);
  const users = getUsers().filter(u => u.role === 'member' || u.role === 'admin');
  const filtered = users.filter(u => !search || u.name.toLowerCase().includes(search) || u.username.toLowerCase().includes(search));
  const wrap = document.getElementById('admin-table-wrap');
  if (!filtered.length) { wrap.innerHTML = `<div class="empty-state"><div class="empty-title">暂无成员</div></div>`; return; }
  wrap.innerHTML = `<table>
    <thead><tr><th>成员</th><th>完成</th><th>进行中</th><th>计划</th><th>状态</th><th>操作</th></tr></thead>
    <tbody>${filtered.map(u => {
      const r = reports.find(x => x.username === u.username);
      if (!r) return `<tr><td><b>${u.name}</b> <span style="color:var(--text3);font-size:12px">${u.username}</span></td><td>-</td><td>-</td><td>-</td><td><span class="badge" style="background:#fff0e6;color:#7d3c00">未提交</span></td><td>-</td></tr>`;
      return `<tr><td><b>${u.name}</b> <span style="color:var(--text3);font-size:12px">${u.username}</span></td>
        <td>${r.done.length}</td><td>${r.progress.length}</td><td>${r.todo.length}</td>
        <td><span class="badge badge-done">已提交</span></td>
        <td><a onclick="showDetail('${r.key}')">查看</a></td></tr>`;
    }).join('')}</tbody></table>`;
}

// ============ USER MANAGEMENT ============
function renderUsers() {
  const users = getUsers();
  const wrap = document.getElementById('users-table-wrap');
  wrap.innerHTML = `<table>
    <thead><tr><th>用户名</th><th>姓名</th><th>角色</th><th>操作</th></tr></thead>
    <tbody>${users.map(u => `<tr>
      <td>${u.username}</td><td>${u.name}</td>
      <td><span class="role-tag ${u.role==='admin'?'role-admin':'role-member'}">${u.role==='admin'?'管理员':'成员'}</span></td>
      <td style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn-sm btn-outline" onclick="openEditUser('${u.username}')">编辑</button>
        ${u.username !== currentUser.username ? `<button class="btn-sm btn-danger" onclick="deleteUser('${u.username}')">删除</button>` : ''}
        ${u.role !== 'admin' ? `<button class="btn-sm btn-accent" onclick="setAdmin('${u.username}')">设为管理员</button>` : ''}
      </td>
    </tr>`).join('')}</tbody></table>`;
}

function openAddUser() {
  document.getElementById('modal-body').innerHTML = `
    <h3>添加成员</h3>
    <label>用户名</label><input id="m-uname" placeholder="3-12位字母数字" />
    <label>姓名</label><input id="m-name" placeholder="显示名" />
    <label>密码</label><input type="password" id="m-pass" placeholder="至少6位" />
    <label>角色</label><select id="m-role"><option value="member">成员</option><option value="admin">管理员</option></select>
    <div style="color:var(--danger);font-size:12px;margin-top:6px" id="m-err"></div>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" onclick="closeModal()">取消</button>
      <button class="btn-sm btn-accent" onclick="saveNewUser()">确认添加</button>
    </div>`;
  openModal();
}

function saveNewUser() {
  const u = document.getElementById('m-uname').value.trim();
  const name = document.getElementById('m-name').value.trim();
  const p = document.getElementById('m-pass').value;
  const role = document.getElementById('m-role').value;
  const err = document.getElementById('m-err');
  if (!u || !/^[a-zA-Z0-9_]{3,12}$/.test(u)) { err.textContent = '用户名3-12位字母数字下划线'; return; }
  if (!name) { err.textContent = '请填写姓名'; return; }
  if (p.length < 6) { err.textContent = '密码至少6位'; return; }
  const users = getUsers();
  if (users.find(x => x.username === u)) { err.textContent = '用户名已存在'; return; }
  users.push({ username: u, name, password: encodePass(p), role });
  saveUsers(users); closeModal(); renderUsers(); showToast('成员添加成功');
}

function openEditUser(username) {
  const users = getUsers();
  const u = users.find(x => x.username === username);
  document.getElementById('modal-body').innerHTML = `
    <h3>编辑成员 · ${u.name}</h3>
    <label>姓名</label><input id="m-name" value="${u.name}" />
    <label>新密码（留空不修改）</label><input type="password" id="m-pass" placeholder="至少6位" />
    <div style="color:var(--danger);font-size:12px;margin-top:6px" id="m-err"></div>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" onclick="closeModal()">取消</button>
      <button class="btn-sm btn-accent" onclick="saveEditUser('${username}')">保存</button>
    </div>`;
  openModal();
}

function saveEditUser(username) {
  const name = document.getElementById('m-name').value.trim();
  const p = document.getElementById('m-pass').value;
  const err = document.getElementById('m-err');
  if (!name) { err.textContent = '姓名不能为空'; return; }
  if (p && p.length < 6) { err.textContent = '密码至少6位'; return; }
  const users = getUsers();
  const u = users.find(x => x.username === username);
  u.name = name;
  if (p) u.password = encodePass(p);
  saveUsers(users); closeModal(); renderUsers(); showToast('修改成功');
}

function deleteUser(username) {
  if (!confirm(`确认删除用户 ${username}？其周报数据也将一并删除。`)) return;
  saveUsers(getUsers().filter(u => u.username !== username));
  saveReports(getReports().filter(r => r.username !== username));
  renderUsers(); showToast('已删除');
}

function setAdmin(username) {
  const users = getUsers();
  users.find(u => u.username === username).role = 'admin';
  saveUsers(users); renderUsers(); showToast('已设为管理员');
}

// ============ MODAL / TOAST ============
function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
