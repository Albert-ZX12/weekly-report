<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f9f8f5;
    --border: #e2e0d8;
    --border2: #ccc9be;
    --text: #1a1917;
    --text2: #5a5751;
    --text3: #9a9690;
    --accent: #2d6a4f;
    --accent-light: #e8f5ee;
    --accent-text: #1b4332;
    --danger: #c0392b;
    --danger-light: #fdf0ef;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }

  /* ---- LOADING ---- */
  #loading-screen {
    position: fixed; inset: 0; background: #1b4332;
    display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999;
    transition: opacity 0.4s;
  }
  #loading-screen.hide { opacity: 0; pointer-events: none; }
  .loading-logo { font-size: 32px; font-weight: 700; color: #fff; margin-bottom: 10px; letter-spacing: -0.5px; }
  .loading-sub { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 32px; }
  .loading-bar { width: 200px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; }
  .loading-bar-inner { height: 100%; background: #fff; border-radius: 2px; animation: loadbar 1.2s ease-in-out infinite; }
  @keyframes loadbar { 0%{width:0;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0;margin-left:100%} }

  /* ---- AUTH ---- */
  #auth-screen {
    display: none; min-height: 100vh; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 60%, #40916c 100%);
  }
  #auth-screen.show { display: flex; }
  .auth-box { background: var(--surface); border-radius: 16px; padding: 40px 36px; width: 360px; box-shadow: 0 8px 40px rgba(0,0,0,0.18); }
  .auth-logo { font-size: 28px; font-weight: 700; color: var(--accent); margin-bottom: 6px; letter-spacing: -0.5px; }
  .auth-sub { color: var(--text3); font-size: 13px; margin-bottom: 28px; }
  .auth-box label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 4px; margin-top: 14px; }
  .auth-box input { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; outline: none; background: var(--surface2); transition: border-color 0.15s; }
  .auth-box input:focus { border-color: var(--accent); background: #fff; }
  .btn-primary { width: 100%; padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 20px; transition: background 0.15s; }
  .btn-primary:hover { background: var(--accent-text); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .auth-err { color: var(--danger); font-size: 12px; margin-top: 8px; min-height: 16px; }
  .auth-tabs { display: flex; margin-bottom: 20px; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); }
  .auth-tab { flex: 1; padding: 8px; text-align: center; cursor: pointer; font-size: 13px; background: var(--surface2); color: var(--text2); border: none; transition: all 0.15s; }
  .auth-tab.active { background: var(--accent); color: #fff; font-weight: 600; }

  /* ---- APP LAYOUT ---- */
  #app { display: none; min-height: 100vh; }
  #app.show { display: block; }
  .topbar { position: sticky; top: 0; z-index: 100; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; height: 56px; gap: 16px; box-shadow: var(--shadow); }
  .topbar-logo { font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
  .topbar-spacer { flex: 1; }
  .user-badge { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); font-size: 13px; color: var(--text2); transition: border-color 0.15s; }
  .user-badge:hover { border-color: var(--border2); }
  .avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--accent-light); color: var(--accent-text); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
  .nav-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; font-size: 13px; cursor: pointer; color: var(--text2); transition: all 0.15s; }
  .nav-btn:hover { background: var(--surface2); }
  .nav-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .week-nav:hover { border-color: var(--accent); color: var(--accent); }
  .week-label { font-size: 16px; font-weight: 600; }
  .week-sub { font-size: 12px; color: var(--text3); }
  .current-badge { background: var(--accent-light); color: var(--accent-text); padding: 3px 10px; border-radius: 10px; font-size: 12px; font-weight: 600; }

  /* ---- REPORT FORM ---- */
  .report-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 24px; margin-bottom: 16px; }
  .section-title { font-size: 13px; font-weight: 600; color: var(--accent-text); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }

  .task-list { display: flex; flex-direction: column; gap: 8px; }
  .task-row { display: flex; align-items: flex-start; gap: 8px; }
  .task-row textarea { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; resize: vertical; min-height: 40px; font-family: inherit; outline: none; background: var(--surface2); color: var(--text); transition: border-color 0.15s; }
  .task-row textarea:focus { border-color: var(--accent); background: #fff; }

  .del-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border: none; background: transparent; cursor: pointer; color: var(--text3); font-size: 16px; border-radius: 4px; flex-shrink: 0; margin-top: 4px; }
  .del-btn:hover { color: var(--danger); background: var(--danger-light); }
  .add-btn { display: flex; align-items: center; gap: 4px; padding: 7px 12px; border: 1px dashed var(--border2); border-radius: var(--radius-sm); background: transparent; cursor: pointer; font-size: 13px; color: var(--text3); margin-top: 8px; transition: all 0.15s; }

  .stat-done { background: #e8f5ee; color: #1b4332; border-color: #b7e0c8; }

  .page-title { font-size: 20px; font-weight: 700; }
  .btn-sm { padding: 6px 14px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; font-weight: 500; transition: all 0.15s; }

  .btn-danger { border: none; background: var(--danger); color: #fff; }

  .role-tag { font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
  .role-admin { background: #e8f5ee; color: #1b4332; }
  .role-member { background: #eff3fb; color: #1a4480; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: none; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 12px; padding: 28px; width: 380px; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .modal label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; outline: none; }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .modal-err { color: var(--danger); font-size: 12px; margin-top: 6px; min-height: 16px; }

  .empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-title { font-size: 15px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--accent); color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; z-index: 300; opacity: 0; transform: translateY(10px); transition: all 0.25s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: var(--danger); }

  @media (max-width: 600px) {
    .main { padding: 16px 12px; }
    .topbar { padding: 0 12px; }
    .history-stats { display: none; }
    .auth-box { width: 90vw; padding: 28px 20px; }
  }
</style>

<script>
// ============ SUPABASE CLIENT ============
let sb;
try {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} catch(e) {
  document.querySelector('.loading-sub').textContent = '配置错误，请检查 SUPABASE_URL 和 SUPABASE_KEY';
}

// ============ STATE ============
let currentUser = null;   // { id, username, name, role }
let currentWeekOffset = 0;
let reportData = { done: [], progress: [], todo: [], summary: '' };
let allReports = [];      // cache for admin view
let allUsers = [];        // cache for admin/users view

// ============ WEEK UTILS ============
function getWeekInfo(offset) {
  const now = new Date();
  const day = now.getDay() || 7;
  const mon = new Date(now);
  mon.setDate(now.getDate() - day + 1 + offset * 7);
  mon.setHours(0, 0, 0, 0);
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  const year = mon.getFullYear();
  const startOfYear = new Date(year, 0, 1);
  const weekNum = Math.ceil(((mon - startOfYear) / 86400000 + startOfYear.getDay() + 1) / 7);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  return {
    key: mon.toISOString().slice(0, 10),
    label: `${year} 年第 ${weekNum} 周`,
    range: `${fmt(mon)} ~ ${fmt(sun)}`
  };
}

// ============ INIT ============
window.addEventListener('DOMContentLoaded', async () => {
  if (!sb) return;
  // Check existing session
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    await loadUserProfile(session.user.id);
  } else {
    hideLoading();
  }
});

async function loadUserProfile(authId) {
  const { data, error } = await sb.from('users').select('*').eq('auth_id', authId).single();
  if (data) {
    currentUser = data;
    enterApp();
  } else {
    hideLoading();
  }
}

function hideLoading() {
  const el = document.getElementById('loading-screen');
  el.classList.add('hide');
  setTimeout(() => { el.style.display = 'none'; }, 400);
  document.getElementById('auth-screen').classList.add('show');
}

// ============ AUTH ============
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
  document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
}

async function doLogin() {
  const u = document.getElementById('l-user').value.trim();
  const p = document.getElementById('l-pass').value;
  const err = document.getElementById('l-err');
  const btn = document.getElementById('l-btn');
  if (!u || !p) { err.textContent = '请填写用户名和密码'; return; }
  err.textContent = ''; btn.disabled = true; btn.textContent = '登录中...';
  try {
    // Find user by username to get their email
    const { data: userRow } = await sb.from('users').select('email').eq('username', u).single();
    if (!userRow) { err.textContent = '用户名或密码错误'; return; }
    const { data, error } = await sb.auth.signInWithPassword({ email: userRow.email, password: p });
    if (error) { err.textContent = '用户名或密码错误'; return; }
    await loadUserProfile(data.user.id);
  } catch(e) {
    err.textContent = '登录失败，请重试';
  } finally {
    btn.disabled = false; btn.textContent = '登 录';
  }
}

async function doRegister() {
  const u = document.getElementById('r-user').value.trim();
  const name = document.getElementById('r-name').value.trim();
  const p = document.getElementById('r-pass').value;
  const err = document.getElementById('r-err');
  const btn = document.getElementById('r-btn');
  if (!u || !/^[a-zA-Z0-9_]{3,12}$/.test(u)) { err.textContent = '用户名3-12位字母数字下划线'; return; }
  if (!name) { err.textContent = '请填写姓名'; return; }
  if (p.length < 6) { err.textContent = '密码至少6位'; return; }
  err.textContent = ''; btn.disabled = true; btn.textContent = '注册中...';
  try {
    // Check username uniqueness
    const { data: exists } = await sb.from('users').select('id').eq('username', u).single();
    if (exists) { err.textContent = '用户名已被使用'; return; }
    // Use username@weeklyreport.app as internal email
    const email = `${u}@wr-internal.local`;
    const { data, error } = await sb.auth.signUp({ email, password: p });
    if (error) { err.textContent = '注册失败：' + error.message; return; }
    // Insert user profile
    const { error: e2 } = await sb.from('users').insert({ auth_id: data.user.id, username: u, name, email, role: 'member' });
    if (e2) { err.textContent = '保存用户信息失败'; return; }
    showToast('注册成功，请登录');
    switchTab('login');
    document.getElementById('l-user').value = u;
  } catch(e) {
    err.textContent = '注册出错，请重试';
  } finally {
    btn.disabled = false; btn.textContent = '注 册';
  }
}

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null;
  document.getElementById('app').classList.remove('show');
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').classList.add('show');
}

function enterApp() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('auth-screen').classList.remove('show');
  const app = document.getElementById('app');
  app.style.display = 'block';
  app.classList.add('show');
  document.getElementById('top-name').textContent = currentUser.name;
  document.getElementById('top-avatar').textContent = currentUser.name.slice(0, 1);
  if (currentUser.role === 'admin') {
    document.getElementById('nav-admin').style.display = '';
    document.getElementById('nav-users').style.display = '';
  }
  currentWeekOffset = 0;
  showView('my-report');
}

// ============ NAVIGATION ============
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  const navMap = { 'my-report': 'nav-my', 'history': 'nav-history', 'admin': 'nav-admin', 'users': 'nav-users', 'detail': 'nav-history' };
  if (navMap[name]) { const el = document.getElementById(navMap[name]); if (el) el.classList.add('active'); }
  if (name === 'my-report') renderReport();
  if (name === 'history') renderHistory();
  if (name === 'admin') renderAdminInit();
  if (name === 'users') renderUsers();
}

function changeWeek(d) { currentWeekOffset += d; renderReport(); }

// ============ REPORT FORM ============
async function renderReport() {
  const wi = getWeekInfo(currentWeekOffset);
  document.getElementById('week-label').textContent = wi.label;
  document.getElementById('week-range').textContent = wi.range;
  document.getElementById('week-cur-badge').style.display = currentWeekOffset === 0 ? '' : 'none';
  document.getElementById('save-tip').textContent = '加载中...';

  const { data } = await sb.from('reports')
    .select('*').eq('user_id', currentUser.id).eq('week_key', wi.key).single();

  if (data) {
    reportData = { done: data.done || [], progress: data.progress || [], todo: data.todo || [], summary: data.summary || '' };
    document.getElementById('save-tip').textContent = `上次保存：${new Date(data.updated_at).toLocaleString('zh-CN',{hour12:false})}`;
  } else {
    reportData = { done: [], progress: [], todo: [], summary: '' };
    document.getElementById('save-tip').textContent = '尚未填写';
  }

  renderList('done-list', reportData.done);
  renderList('progress-list', reportData.progress);
  renderList('todo-list', reportData.todo);
  document.getElementById('summary-text').value = reportData.summary;
}

function renderList(containerId, items) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  items.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'task-row';
    row.innerHTML = `
      <textarea placeholder="事项描述...">${item.text || ''}</textarea>
      <select class="task-status">
        <option value="done" ${item.status==='done'?'selected':''}>✅ 已完成</option>
        <option value="progress" ${item.status==='progress'?'selected':''}>🔄 进行中</option>
        <option value="todo" ${item.status==='todo'?'selected':''}>📌 待办</option>
        <option value="blocked" ${item.status==='blocked'?'selected':''}>🚫 受阻</option>
      </select>
      <button class="del-btn" title="删除">×</button>`;
    row.querySelector('textarea').oninput = e => items[i].text = e.target.value;
    row.querySelector('select').onchange = e => items[i].status = e.target.value;
    row.querySelector('.del-btn').onclick = () => { items.splice(i, 1); renderList(containerId, items); };
    el.appendChild(row);
  });
}

function addTask(type) {
  const map = { done: reportData.done, progress: reportData.progress, todo: reportData.todo };
  const statusMap = { done: 'done', progress: 'progress', todo: 'todo' };
  map[type].push({ text: '', status: statusMap[type] });
  const idMap = { done: 'done-list', progress: 'progress-list', todo: 'todo-list' };
  renderList(idMap[type], map[type]);
  document.getElementById(idMap[type]).lastElementChild.querySelector('textarea').focus();
}

async function saveReport() {
  reportData.summary = document.getElementById('summary-text').value;
  const wi = getWeekInfo(currentWeekOffset);
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '保存中...';
  try {
    const payload = {
      user_id: currentUser.id,
      week_key: wi.key,
      week_label: wi.label,
      week_range: wi.range,
      done: reportData.done,
      progress: reportData.progress,
      todo: reportData.todo,
      summary: reportData.summary,
      updated_at: new Date().toISOString()
    };
    const { error } = await sb.from('reports').upsert(payload, { onConflict: 'user_id,week_key' });
    if (error) { showToast('保存失败：' + error.message, true); return; }
    document.getElementById('save-tip').textContent = `上次保存：${new Date().toLocaleString('zh-CN',{hour12:false})}`;
    showToast('周报保存成功 ✓');
  } finally {
    btn.disabled = false; btn.textContent = '保存周报';
  }
}

// ============ HISTORY ============
async function renderHistory() {
  const el = document.getElementById('history-list');
  el.innerHTML = '<div class="empty-state"><div class="save-tip">加载中...</div></div>';
  const { data } = await sb.from('reports').select('*').eq('user_id', currentUser.id).order('week_key', { ascending: false });
  if (!data || !data.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-title">暂无周报记录</div><div>填写并保存本周周报后，历史记录将显示在这里</div></div>`;
    return;
  }
  el.innerHTML = data.map(r => `
    <div class="history-card" onclick='showDetail(${JSON.stringify(r.id)})'>
      <div>
        <div class="history-week">${r.week_label}</div>
        <div class="history-dates">${r.week_range}</div>
      </div>
      <div class="history-stats">
        ${r.done?.length ? `<div class="stat-pill stat-done">✅ 完成 ${r.done.length}</div>` : ''}
        ${r.progress?.length ? `<div class="stat-pill stat-progress">🔄 进行 ${r.progress.length}</div>` : ''}
        ${r.todo?.length ? `<div class="stat-pill stat-todo">📌 计划 ${r.todo.length}</div>` : ''}
      </div>
    </div>`).join('');
}

async function showDetail(id) {
  const { data: r } = await sb.from('reports').select('*').eq('id', id).single();
  if (!r) return;
  const statusMap = { done: 'badge-done', progress: 'badge-progress', todo: 'badge-todo', blocked: 'badge-blocked' };
  const statusLabel = { done: '已完成', progress: '进行中', todo: '待办', blocked: '受阻' };
  const renderSection = (title, items) => {
    if (!items?.length) return '';
    return `<div class="report-card">
      <div class="section-title">${title}</div>
      ${items.map(t => `<div class="readonly-task">
        <span class="badge ${statusMap[t.status]||'badge-todo'}">${statusLabel[t.status]||'待办'}</span>
        <div class="readonly-task-text">${t.text || '（未填写）'}</div>
      </div>`).join('')}
    </div>`;
  };
  document.getElementById('detail-content').innerHTML = `
    <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:20px">
      <div class="page-title">${r.week_label}</div>
      <div style="color:var(--text3);font-size:13px">${r.week_range}</div>
    </div>
    ${renderSection('本周完成事项', r.done)}
    ${renderSection('进行中事项', r.progress)}
    ${renderSection('下周计划', r.todo)}
    ${r.summary ? `<div class="report-card"><div class="section-title">总结与备注</div><div style="font-size:13px;line-height:1.8;white-space:pre-wrap">${r.summary}</div></div>` : ''}`;
  document.getElementById('view-detail').dataset.prevReportId = id;
  showView('detail');
}

// ============ ADMIN ============
async function renderAdminInit() {
  const { data: reports } = await sb.from('reports').select('*').order('week_key', { ascending: false });
  const { data: users } = await sb.from('users').select('*').order('name');
  allReports = reports || [];
  allUsers = users || [];

  const weeks = [...new Set(allReports.map(r => r.week_key))].sort().reverse();
  const sel = document.getElementById('admin-week-sel');
  sel.innerHTML = weeks.map(w => `<option value="${w}">${w}</option>`).join('');
  renderAdmin();
}

function renderAdmin() {
  const weekKey = document.getElementById('admin-week-sel').value;
  const search = document.getElementById('admin-search').value.trim().toLowerCase();
  const reports = allReports.filter(r => r.week_key === weekKey);
  const users = allUsers.filter(u => !search || u.name.toLowerCase().includes(search) || u.username.toLowerCase().includes(search));
  const wrap = document.getElementById('admin-table-wrap');
  if (!users.length) { wrap.innerHTML = `<div class="empty-state"><div class="empty-title">暂无成员</div></div>`; return; }
  wrap.innerHTML = `<table>
    <thead><tr><th>成员</th><th>完成</th><th>进行中</th><th>计划</th><th>状态</th><th>操作</th></tr></thead>
    <tbody>${users.map(u => {
      const r = reports.find(x => x.user_id === u.id);
      if (!r) return `<tr><td><b>${u.name}</b> <span style="color:var(--text3);font-size:12px">${u.username}</span></td><td>-</td><td>-</td><td>-</td><td><span class="badge badge-unsubmit">未提交</span></td><td>-</td></tr>`;
      return `<tr><td><b>${u.name}</b> <span style="color:var(--text3);font-size:12px">${u.username}</span></td>
        <td>${r.done?.length||0}</td><td>${r.progress?.length||0}</td><td>${r.todo?.length||0}</td>
        <td><span class="badge badge-done">已提交</span></td>
        <td><a onclick="showDetail('${r.id}')">查看</a></td></tr>`;
    }).join('')}</tbody></table>`;
}

// ============ USER MANAGEMENT ============
async function renderUsers() {
  const wrap = document.getElementById('users-table-wrap');
  wrap.innerHTML = '<div class="empty-state"><div class="save-tip">加载中...</div></div>';
  const { data: users } = await sb.from('users').select('*').order('name');
  allUsers = users || [];
  if (!users?.length) { wrap.innerHTML = `<div class="empty-state"><div class="empty-title">暂无成员</div></div>`; return; }
  wrap.innerHTML = `<table>
    <thead><tr><th>用户名</th><th>姓名</th><th>角色</th><th>操作</th></tr></thead>
    <tbody>${users.map(u => `<tr>
      <td>${u.username}</td><td>${u.name}</td>
      <td><span class="role-tag ${u.role==='admin'?'role-admin':'role-member'}">${u.role==='admin'?'管理员':'成员'}</span></td>
      <td style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn-sm btn-outline" onclick="openEditUser('${u.id}','${u.name}')">编辑姓名</button>
        <button class="btn-sm btn-outline" onclick="openResetPass('${u.id}','${u.name}')">重置密码</button>
        ${u.id !== currentUser.id ? `<button class="btn-sm btn-danger" onclick="deleteUser('${u.id}','${u.name}')">删除</button>` : ''}
        ${u.role !== 'admin' ? `<button class="btn-sm btn-accent" onclick="setAdmin('${u.id}')">设为管理员</button>` : ''}
      </td>
    </tr>`).join('')}</tbody></table>`;
}

function openAddUser() {
  document.getElementById('modal-body').innerHTML = `
    <h3>添加成员</h3>
    <label>用户名</label><input id="m-uname" placeholder="3-12位字母数字下划线" />
    <label>姓名</label><input id="m-name" placeholder="显示名" />
    <label>初始密码</label><input type="password" id="m-pass" placeholder="至少6位" />
    <label>角色</label><select id="m-role"><option value="member">成员</option><option value="admin">管理员</option></select>
    <div class="modal-err" id="m-err"></div>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" onclick="closeModal()">取消</button>
      <button class="btn-sm btn-accent" id="m-confirm" onclick="saveNewUser()">确认添加</button>
    </div>`;
  openModal();
}

async function saveNewUser() {
  const u = document.getElementById('m-uname').value.trim();
  const name = document.getElementById('m-name').value.trim();
  const p = document.getElementById('m-pass').value;
  const role = document.getElementById('m-role').value;
  const err = document.getElementById('m-err');
  const btn = document.getElementById('m-confirm');
  if (!u || !/^[a-zA-Z0-9_]{3,12}$/.test(u)) { err.textContent = '用户名3-12位字母数字下划线'; return; }
  if (!name) { err.textContent = '请填写姓名'; return; }
  if (p.length < 6) { err.textContent = '密码至少6位'; return; }
  err.textContent = ''; btn.disabled = true; btn.textContent = '添加中...';
  try {
    const { data: exists } = await sb.from('users').select('id').eq('username', u).single();
    if (exists) { err.textContent = '用户名已存在'; return; }
    const email = `${u}@wr-internal.local`;
    const { data, error } = await sb.auth.signUp({ email, password: p });
    if (error) { err.textContent = '创建失败：' + error.message; return; }
    await sb.from('users').insert({ auth_id: data.user.id, username: u, name, email, role });
    closeModal(); renderUsers(); showToast('成员添加成功');
  } catch(e) { err.textContent = '操作失败，请重试'; }
  finally { btn.disabled = false; btn.textContent = '确认添加'; }
}

function openEditUser(id, name) {
  document.getElementById('modal-body').innerHTML = `
    <h3>编辑姓名</h3>
    <label>新姓名</label><input id="m-name" value="${name}" />
    <div class="modal-err" id="m-err"></div>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" onclick="closeModal()">取消</button>
      <button class="btn-sm btn-accent" id="m-confirm" onclick="saveEditUser('${id}')">保存</button>
    </div>`;
  openModal();
}

async function saveEditUser(id) {
  const name = document.getElementById('m-name').value.trim();
  const err = document.getElementById('m-err');
  if (!name) { err.textContent = '姓名不能为空'; return; }
  const btn = document.getElementById('m-confirm');
  btn.disabled = true;
  await sb.from('users').update({ name }).eq('id', id);
  closeModal(); renderUsers(); showToast('修改成功');
}

function openResetPass(id, name) {
  document.getElementById('modal-body').innerHTML = `
    <h3>重置密码 · ${name}</h3>
    <label>新密码</label><input type="password" id="m-pass" placeholder="至少6位" />
    <div class="modal-err" id="m-err"></div>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" onclick="closeModal()">取消</button>
      <button class="btn-sm btn-accent" id="m-confirm" onclick="saveResetPass('${id}')">确认重置</button>
    </div>`;
  openModal();
}

async function saveResetPass(id) {
  const p = document.getElementById('m-pass').value;
  const err = document.getElementById('m-err');
  if (p.length < 6) { err.textContent = '密码至少6位'; return; }
  const btn = document.getElementById('m-confirm');
  btn.disabled = true; btn.textContent = '重置中...';
  // Get auth_id first
  const { data: u } = await sb.from('users').select('auth_id').eq('id', id).single();
  if (!u) { err.textContent = '找不到用户'; btn.disabled = false; btn.textContent = '确认重置'; return; }
  // Use admin API via edge function (or just update via Supabase dashboard)
  // Since we can't call admin API from frontend, we store a reset request
  const { error } = await sb.from('password_resets').upsert({ user_id: id, new_password_hash: btoa(p), requested_at: new Date().toISOString() });
  if (error) { err.textContent = '请到 Supabase 后台手动重置密码'; btn.disabled = false; btn.textContent = '确认重置'; return; }
  closeModal(); showToast('密码重置请求已提交，请在 Supabase 后台执行');
}

async function deleteUser(id, name) {
  if (!confirm(`确认删除成员「${name}」？其所有周报也将一并删除。`)) return;
  await sb.from('reports').delete().eq('user_id', id);
  await sb.from('users').delete().eq('id', id);
  renderUsers(); showToast('已删除');
}

async function setAdmin(id) {
  await sb.from('users').update({ role: 'admin' }).eq('id', id);
  renderUsers(); showToast('已设为管理员');
}

// ============ MODAL / TOAST ============
function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });

let toastTimer;
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
