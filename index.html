<style>
/* ===== BASE ===== */
*,*::before,*::after{box-sizing:border-box}
html{font-size:14px}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;background:#f0f2f5;color:#1f2937;margin:0;min-height:100vh;line-height:1.6}

/* ===== LOADING ===== */
#ls{position:fixed;inset:0;background:linear-gradient(135deg,#001d66,#003eb3 55%,#1677ff);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#ls.hide{opacity:0;pointer-events:none}
.ll{font-size:32px;font-weight:800;color:#fff;letter-spacing:-1px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.ll-icon{width:46px;height:46px;background:rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.ls-sub{color:rgba(255,255,255,.6);font-size:13px;margin-bottom:32px}
.ls-spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== AUTH ===== */
#auth{display:none;min-height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,#001d66,#003eb3 55%,#1677ff);position:relative;overflow:hidden}
#auth::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E")}
#auth.show{display:flex}
.auth-card{background:rgba(255,255,255,.98);backdrop-filter:blur(20px);border-radius:20px;padding:44px 40px;width:400px;box-shadow:0 24px 48px rgba(0,0,0,.25);position:relative;z-index:1}
.auth-brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.auth-brand-icon{width:42px;height:42px;background:linear-gradient(135deg,#1677ff,#001d66);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;color:#fff}
.auth-brand-name{font-size:21px;font-weight:800;color:#001d66;letter-spacing:-.5px}
.auth-desc{color:#9ca3af;font-size:13px;margin-bottom:28px}
.auth-tabs{display:flex;border-radius:8px;overflow:hidden;border:1px solid #e5e7eb;margin-bottom:22px}
.auth-tab{flex:1;padding:9px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;background:#f9fafb;color:#6b7280;border:none;transition:all .2s}
.auth-tab.active{background:#1677ff;color:#fff;font-weight:600}
.f-group{margin-bottom:14px}
.f-label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.f-input{width:100%;padding:10px 13px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none;background:#fff;color:#1f2937;font-family:inherit;transition:all .2s}
.f-input:focus{border-color:#1677ff;box-shadow:0 0 0 3px rgba(22,119,255,.1)}
.f-err{color:#ef4444;font-size:12px;margin-top:5px;min-height:16px}
.btn-auth{width:100%;padding:11px;background:linear-gradient(135deg,#1677ff,#003eb3);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;transition:all .2s;letter-spacing:.3px}
.btn-auth:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 14px rgba(22,119,255,.4)}
.btn-auth:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}

/* ===== APP ===== */
#app{display:none;min-height:100vh;flex-direction:column}
#app.show{display:flex}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:linear-gradient(90deg,#001d66,#003eb3);height:54px;display:flex;align-items:center;padding:0 20px;gap:0;box-shadow:0 2px 8px rgba(0,0,0,.2);flex-shrink:0;width:100%}
.tb-logo{display:flex;align-items:center;gap:9px;flex-shrink:0;margin-right:10px}
.tb-logo-icon{width:30px;height:30px;background:linear-gradient(135deg,#1677ff,#40a9ff);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.tb-logo-text{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.2px;white-space:nowrap}
.tb-nav{display:flex;align-items:center;flex:1;gap:2px;overflow-x:auto;scrollbar-width:none;min-width:0}
.tb-nav::-webkit-scrollbar{display:none}
.tb-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px;font-size:13px;font-weight:500;color:rgba(255,255,255,.72);cursor:pointer;border:none;background:transparent;white-space:nowrap;transition:all .2s;flex-shrink:0}
.tb-btn:hover{color:#fff;background:rgba(255,255,255,.12)}
.tb-btn.active{color:#fff;background:rgba(22,119,255,.55)}
.tb-right{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:8px}
.tb-notif{position:relative;cursor:pointer;padding:6px 10px;border-radius:6px;color:rgba(255,255,255,.7);font-size:13px;border:none;background:transparent;transition:all .2s}
.tb-notif:hover{background:rgba(255,255,255,.12);color:#fff}
.notif-badge{position:absolute;top:4px;right:6px;width:7px;height:7px;background:#f5222d;border-radius:50%;border:2px solid #003eb3}
.tb-user{display:flex;align-items:center;gap:8px;cursor:pointer;padding:5px 11px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;transition:all .2s}
.tb-user:hover{background:rgba(255,255,255,.16)}
.tb-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#1677ff,#40a9ff);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.tb-username{font-size:13px;font-weight:500}
.tb-logout{font-size:11px;color:rgba(255,255,255,.5)}

/* LAYOUT */
.app-body{flex:1;overflow-y:auto}
.page-wrap{padding:22px 22px 40px;width:100%;box-sizing:border-box}

/* VIEWS */
.view{display:none}.view.active{display:block}

/* PAGE HEADER */
.page-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.page-hd-left{}
.page-title{font-size:20px;font-weight:700;color:#111827;letter-spacing:-.4px;line-height:1.3}
.page-desc{font-size:13px;color:#9ca3af;margin-top:2px}
.page-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* ===== ANT-STYLE BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:0 16px;height:34px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .2s;white-space:nowrap;font-family:inherit}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:#1677ff;color:#fff;border-color:#1677ff}
.btn-primary:hover:not(:disabled){background:#4096ff;border-color:#4096ff;box-shadow:0 2px 8px rgba(22,119,255,.3)}
.btn-default{background:#fff;color:#374151;border-color:#d1d5db}
.btn-default:hover:not(:disabled){border-color:#1677ff;color:#1677ff}
.btn-danger{background:#ef4444;color:#fff;border-color:#ef4444}
.btn-danger:hover:not(:disabled){background:#dc2626;border-color:#dc2626}
.btn-ghost{background:transparent;color:#6b7280;border-color:#d1d5db}
.btn-ghost:hover:not(:disabled){border-color:#1677ff;color:#1677ff;background:#eff6ff}
.btn-sm{height:28px;padding:0 10px;font-size:12px;border-radius:6px}
.btn-xs{height:22px;padding:0 7px;font-size:11px;border-radius:5px}
.btn-link{border:none;background:transparent;color:#1677ff;padding:0 3px;height:auto}
.btn-link:hover{color:#4096ff}

/* ===== CARDS ===== */
.card{background:#fff;border-radius:12px;border:1px solid #f0f0f0;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden}
.card-head{padding:14px 18px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between}
.card-head-title{font-size:14px;font-weight:600;color:#111827;display:flex;align-items:center;gap:7px}
.card-head-title::before{content:'';width:3px;height:14px;background:#1677ff;border-radius:2px;display:inline-block}
.card-body{padding:18px}

/* ===== TAGS ===== */
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid transparent;white-space:nowrap}
.tag-done{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}
.tag-progress{background:#fefce8;color:#a16207;border-color:#fef08a}
.tag-todo{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
.tag-blocked{background:#fef2f2;color:#b91c1c;border-color:#fecaca}
.tag-unsubmit{background:#fff7ed;color:#c2410c;border-color:#fed7aa}
.tag-submitted{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}

/* ===== WEEK NAV ===== */
.week-nav-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;background:#fff;padding:14px 18px;border-radius:12px;border:1px solid #f0f0f0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.week-nav-btn{width:30px;height:30px;border-radius:7px;border:1.5px solid #e5e7eb;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:#6b7280;transition:all .2s;flex-shrink:0}
.week-nav-btn:hover{border-color:#1677ff;color:#1677ff}
.week-info{flex:1}
.week-label-text{font-size:16px;font-weight:700;color:#111827}
.week-range-text{font-size:12px;color:#9ca3af;margin-top:1px}
.week-cur-badge{background:#e6f4ff;color:#1677ff;border:1px solid #91caff;padding:2px 9px;border-radius:10px;font-size:12px;font-weight:600;flex-shrink:0}
.save-bar{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-top:8px}
.save-tip{font-size:12px;color:#9ca3af}

/* ===== REPORT SECTIONS ===== */
.report-section{background:#fff;border-radius:12px;border:1px solid #f0f0f0;padding:20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.section-label{font-size:12px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.section-label::before{content:'';width:3px;height:13px;background:#1677ff;border-radius:2px;display:inline-block}

/* TASK ROWS */
.task-item{background:#f8fafc;border:1.5px solid #e5e7eb;border-radius:10px;padding:12px 14px;margin-bottom:8px;transition:border-color .2s}
.task-item:hover{border-color:#93c5fd}
.task-item-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}

/* Tag picker */
.tag-picker-wrap{position:relative;flex-shrink:0}
.tag-pill-btn{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:12px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid #e5e7eb;background:#fff;color:#9ca3af;white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis;transition:all .2s}
.tag-pill-btn:hover{border-color:#1677ff;color:#1677ff}
.tag-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tag-dropdown{position:absolute;top:calc(100%+4px);left:0;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:60;min-width:180px;max-height:240px;overflow-y:auto;display:none}
.tag-dropdown.open{display:block}
.tag-opt{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-size:13px;transition:background .1s}
.tag-opt:hover{background:#f0f7ff}
.tag-add-opt{padding:8px 12px;font-size:12px;color:#1677ff;cursor:pointer;border-top:1px solid #f0f0f0;display:flex;align-items:center;gap:5px}
.tag-add-opt:hover{background:#eff6ff}

.status-select{padding:4px 8px;border:1.5px solid #e5e7eb;border-radius:7px;font-size:12px;cursor:pointer;outline:none;background:#fff;color:#374151;height:28px;transition:border-color .2s}
.status-select:focus{border-color:#1677ff}
.del-task-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;color:#d1d5db;font-size:16px;border-radius:5px;flex-shrink:0;margin-left:auto;transition:all .15s}
.del-task-btn:hover{color:#ef4444;background:#fef2f2}
.task-textarea{width:100%;padding:8px 10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;resize:vertical;min-height:38px;font-family:inherit;outline:none;background:#fff;color:#1f2937;transition:border-color .2s;line-height:1.6}
.task-textarea:focus{border-color:#1677ff;box-shadow:0 0 0 3px rgba(22,119,255,.08)}

/* Task actions */
.task-actions{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.task-action-btn{display:flex;align-items:center;gap:3px;padding:3px 9px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:11px;color:#9ca3af;cursor:pointer;background:transparent;transition:all .15s}
.task-action-btn:hover{border-color:#1677ff;color:#1677ff;background:#eff6ff}
.task-action-btn.has-data{color:#1677ff;border-color:#93c5fd;background:#eff6ff}

/* Attach chips */
.attach-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.attach-chip{display:flex;align-items:center;gap:5px;padding:3px 9px;background:#fff;border:1.5px solid #e5e7eb;border-radius:7px;font-size:11px;color:#6b7280;cursor:pointer;max-width:180px;transition:all .15s}
.attach-chip:hover{border-color:#1677ff;color:#1677ff}
.chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip-del{color:#d1d5db;font-size:13px;flex-shrink:0;transition:color .15s}
.chip-del:hover{color:#ef4444}

/* Comments panel */
.comments-panel{margin-top:10px;border-top:1px solid #f0f0f0;padding-top:10px}
.comment-item{display:flex;gap:8px;margin-bottom:10px}
.comment-av{width:26px;height:26px;border-radius:50%;background:#dbeafe;color:#1d4ed8;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.comment-bub{flex:1;background:#f8fafc;border-radius:0 9px 9px 9px;padding:9px 12px;border:1px solid #f0f0f0}
.comment-hd{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.comment-author{font-size:12px;font-weight:700;color:#374151}
.comment-time{font-size:11px;color:#9ca3af}
.comment-del-btn{margin-left:auto;font-size:11px;color:#9ca3af;cursor:pointer}
.comment-del-btn:hover{color:#ef4444}
.comment-text{font-size:13px;color:#6b7280;line-height:1.55;word-break:break-word}
.mention-hl{color:#1677ff;font-weight:600;background:#eff6ff;padding:0 3px;border-radius:3px;font-size:12px}
.comment-input-wrap{display:flex;gap:7px;align-items:flex-start;position:relative}
.comment-ta{flex:1;padding:8px 11px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;resize:none;min-height:36px;max-height:100px;font-family:inherit;outline:none;background:#fff;transition:border-color .2s}
.comment-ta:focus{border-color:#1677ff;box-shadow:0 0 0 3px rgba(22,119,255,.08)}
.comment-send{padding:0 14px;height:36px;background:#1677ff;color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .2s}
.comment-send:hover{background:#4096ff}
.mention-popup{position:absolute;bottom:calc(100%+5px);left:0;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:70;min-width:170px;display:none;overflow:hidden}
.mention-popup.open{display:block}
.mention-opt{padding:8px 12px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;transition:background .1s}
.mention-opt:hover{background:#f0f7ff}
.mention-av{width:22px;height:22px;border-radius:50%;background:#dbeafe;color:#1d4ed8;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}

/* Summary */
.summary-textarea{width:100%;padding:11px 13px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;min-height:88px;resize:vertical;font-family:inherit;outline:none;background:#fff;color:#1f2937;line-height:1.7;transition:border-color .2s}
.summary-textarea:focus{border-color:#1677ff;box-shadow:0 0 0 3px rgba(22,119,255,.08)}

/* Add task btn */
.add-task-btn{display:flex;align-items:center;gap:5px;padding:8px 13px;border:2px dashed #d1d5db;border-radius:8px;background:transparent;cursor:pointer;font-size:13px;color:#9ca3af;margin-top:8px;width:100%;justify-content:center;transition:all .2s}
.add-task-btn:hover{border-color:#1677ff;color:#1677ff;background:#eff6ff}

/* ===== HISTORY ===== */
.history-list{display:flex;flex-direction:column;gap:10px}
.history-card{background:#fff;border:1px solid #f0f0f0;border-radius:12px;padding:16px 20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.history-card:hover{border-color:#93c5fd;box-shadow:0 4px 14px rgba(22,119,255,.1);transform:translateY(-1px)}
.history-week{font-size:14px;font-weight:600;color:#111827}
.history-range{font-size:12px;color:#9ca3af;margin-top:1px}
.history-stats{display:flex;gap:7px;margin-left:auto;flex-wrap:wrap}
.stat-pill{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:600;border:1.5px solid}
.sp-done{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}
.sp-progress{background:#fefce8;color:#a16207;border-color:#fef08a}
.sp-todo{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}

/* ===== DETAIL VIEW ===== */
.back-btn{display:inline-flex;align-items:center;gap:5px;color:#6b7280;cursor:pointer;font-size:13px;margin-bottom:16px;padding:6px 0;border:none;background:transparent;font-weight:500;transition:color .15s}
.back-btn:hover{color:#1677ff}
.detail-task-item{border:1px solid #f0f0f0;border-radius:10px;padding:13px 16px;margin-bottom:8px;background:#f8fafc}
.detail-task-top{display:flex;align-items:center;gap:7px;margin-bottom:6px;flex-wrap:wrap}
.detail-task-text{font-size:13px;color:#374151;line-height:1.6;margin-bottom:8px;white-space:pre-wrap;word-break:break-word}

/* ===== ADMIN TABLE ===== */
.ant-table-wrap{background:#fff;border-radius:12px;border:1px solid #f0f0f0;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ant-table{width:100%;border-collapse:collapse}
.ant-table thead th{padding:11px 14px;font-size:12px;font-weight:600;text-align:left;background:#fafafa;color:#9ca3af;border-bottom:1px solid #f0f0f0;white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
.ant-table tbody td{padding:12px 14px;font-size:13px;border-bottom:1px solid #fafafa;color:#374151;vertical-align:middle}
.ant-table tbody tr:last-child td{border-bottom:none}
.ant-table tbody tr:hover td{background:#f0f7ff}
.ant-table td a{color:#1677ff;cursor:pointer}
.ant-table td a:hover{text-decoration:underline}

/* Admin filter */
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:14px 16px;background:#fff;border-radius:12px;border:1px solid #f0f0f0;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.filter-sel,.filter-input{padding:7px 11px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;background:#fff;outline:none;color:#1f2937;transition:border-color .2s;height:34px}
.filter-sel:focus,.filter-input:focus{border-color:#1677ff}
.filter-input{min-width:180px}

<script>
// ============ INIT ============
let sb;
try{ sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY); }catch(e){}

let currentUser=null,currentWeekOffset=0;
let reportData={done:[],plan:[],todo:[],lastTodos:[],summary:''};
let currentReportId=null;
let allUsers=[],allReports=[],myTags=[];
const TAG_COLORS=['#2d6a4f','#1a4480','#7d3c00','#7f1d1d','#5b2d8e','#1a6b6b','#7d5a00','#555555'];

// ============ WEEK UTILS ============
function getWeekInfo(offset){
  const now=new Date(),day=now.getDay()||7;
  const mon=new Date(now);
  mon.setDate(now.getDate()-day+1+offset*7);mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const year=mon.getFullYear();
  const weekNum=Math.ceil(((mon-new Date(year,0,1))/86400000+new Date(year,0,1).getDay()+1)/7);
  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
  return{key:mon.toISOString().slice(0,10),label:`${year} 年第 ${weekNum} 周`,range:`${fmt(mon)} ~ ${fmt(sun)}`};
}

// ============ INIT LOAD ============
window.addEventListener('DOMContentLoaded',async()=>{
  if(!sb)return;
  const{data:{session}}=await sb.auth.getSession();
  if(session){await loadUserProfile(session.user.id);}else{hideLoading();}
});
async function loadUserProfile(authId){
  const{data}=await sb.from('users').select('*').eq('auth_id',authId).single();
  if(data){currentUser=data;await enterApp();}else{hideLoading();}
}
function hideLoading(){
  const el=document.getElementById('ls');
  el.classList.add('hide');setTimeout(()=>el.style.display='none',400);
  document.getElementById('auth').classList.add('show');
}

// ============ AUTH ============
function switchTab(tab){
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0)===(tab==='login')));
  document.getElementById('login-form').style.display=tab==='login'?'':'none';
  document.getElementById('register-form').style.display=tab==='register'?'':'none';
}
async function doLogin(){
  const u=document.getElementById('l-user').value.trim(),p=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err'),btn=document.getElementById('l-btn');
  if(!u||!p){err.textContent='请填写用户名和密码';return;}
  err.textContent='';btn.disabled=true;btn.textContent='登录中...';
  try{
    const{data:ur}=await sb.from('users').select('email').eq('username',u).single();
    if(!ur){err.textContent='用户名或密码错误';return;}
    const{data,error}=await sb.auth.signInWithPassword({email:ur.email,password:p});
    if(error){err.textContent='用户名或密码错误';return;}
    await loadUserProfile(data.user.id);
  }catch(e){err.textContent='登录失败，请重试';}
  finally{btn.disabled=false;btn.textContent='登 录';}
}
async function doRegister(){
  const u=document.getElementById('r-user').value.trim(),name=document.getElementById('r-name').value.trim(),p=document.getElementById('r-pass').value;
  const err=document.getElementById('r-err'),btn=document.getElementById('r-btn');
  if(!u||!/^[a-zA-Z0-9_]{3,12}$/.test(u)){err.textContent='用户名3-12位字母数字下划线';return;}
  if(!name){err.textContent='请填写姓名';return;}
  if(p.length<6){err.textContent='密码至少6位';return;}
  err.textContent='';btn.disabled=true;btn.textContent='注册中...';
  try{
    const{data:ex}=await sb.from('users').select('id').eq('username',u).single();
    if(ex){err.textContent='用户名已存在';return;}
    const email=`${u}@wr-internal.local`;
    const{data,error}=await sb.auth.signUp({email,password:p});
    if(error){err.textContent='注册失败：'+error.message;return;}
    await sb.from('users').insert({auth_id:data.user.id,username:u,name,email,role:'member'});
    showToast('注册成功，请登录','success');switchTab('login');
    document.getElementById('l-user').value=u;
  }catch(e){err.textContent='注册出错，请重试';}
  finally{btn.disabled=false;btn.textContent='注 册';}
}
async function doLogout(){
  await sb.auth.signOut();currentUser=null;
  document.getElementById('app').style.display='none';
  document.getElementById('auth').classList.add('show');
}
async function enterApp(){
  document.getElementById('ls').style.display='none';
  document.getElementById('auth').classList.remove('show');
  const app=document.getElementById('app');app.style.display='flex';
  document.getElementById('top-name').textContent=currentUser.name;
  document.getElementById('top-avatar').textContent=currentUser.name.slice(0,1);
  if(currentUser.role==='admin'){
    document.getElementById('nav-admin').style.display='';
    document.getElementById('nav-users').style.display='';
  }
  const{data:users}=await sb.from('users').select('*').order('name');
  allUsers=users||[];
  await loadMyTags();
  await checkNotifications();
  currentWeekOffset=0;
  showView('my-report');
}

// ============ NAVIGATION ============
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tb-btn').forEach(b=>b.classList.remove('active'));
  const vEl=document.getElementById('view-'+name);
  if(vEl)vEl.classList.add('active');
  const nb=document.querySelector(`.tb-btn[data-view="${name}"]`);
  if(nb)nb.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  if(name==='my-report')renderReport();
  if(name==='history')renderHistory();
  if(name==='admin')renderAdminInit();
  if(name==='users')renderUsers();
  if(name==='notifications')renderNotifications();
}
function changeWeek(d){currentWeekOffset+=d;renderReport();}

// ============ TAGS ============
async function loadMyTags(){
  const{data}=await sb.from('task_tags').select('*').order('title');
  myTags=data||[];
}
function renderTagDropdown(dropId,onSelect){
  const wrap=document.getElementById(dropId);if(!wrap)return;
  wrap.innerHTML='';
  myTags.forEach(tag=>{
    const opt=document.createElement('div');opt.className='tag-opt';
    opt.innerHTML=`<span class="tag-dot" style="background:${tag.color}"></span>${tag.title}`;
    opt.onclick=e=>{e.stopPropagation();onSelect(tag);wrap.classList.remove('open');};
    wrap.appendChild(opt);
  });
  const add=document.createElement('div');add.className='tag-add-opt';
  add.innerHTML='＋ 管理任务标题库';
  add.onclick=e=>{e.stopPropagation();wrap.classList.remove('open');openTagManager();};
  wrap.appendChild(add);
}
function openTagManager(){
  const renderItems=()=>myTags.map(t=>`
    <div class="tag-mgr-item">
      <span class="tag-color-dot" style="background:${t.color}"></span>
      <span>${t.title}</span>
      <span class="tag-mgr-del" onclick="deleteTag('${t.id}')">×</span>
    </div>`).join('');
  showModal('🏷 任务标题库',`
    <div class="tag-mgr-grid" id="tag-mgr-grid">${renderItems()}</div>
    <div class="mf-group"><label class="mf-label">添加新标题</label><input class="mf-input" id="new-tag-title" placeholder="如：需求开发、Bug修复..."/></div>
    <div class="mf-group"><label class="mf-label">颜色</label>
      <div class="color-swatches">${TAG_COLORS.map(c=>`<div class="color-swatch" style="background:${c}" data-color="${c}" onclick="selectSwatch(this)"></div>`).join('')}</div>
    </div>
    <div class="modal-err" id="tag-err"></div>`,
    [{label:'关闭',type:'default',fn:'closeModal()'},{label:'添加',type:'primary',fn:'saveNewTag()'}]);
  document.querySelector('.color-swatch')?.classList.add('selected');
}
function selectSwatch(el){document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));el.classList.add('selected');}
async function saveNewTag(){
  const title=document.getElementById('new-tag-title')?.value.trim();
  const color=document.querySelector('.color-swatch.selected')?.dataset.color||TAG_COLORS[0];
  if(!title){document.getElementById('tag-err').textContent='请填写标题';return;}
  const{data,error}=await sb.from('task_tags').insert({user_id:currentUser.id,title,color}).select().single();
  if(error){document.getElementById('tag-err').textContent='保存失败';return;}
  myTags.push(data);
  document.getElementById('tag-mgr-grid').innerHTML=myTags.map(t=>`
    <div class="tag-mgr-item"><span class="tag-color-dot" style="background:${t.color}"></span><span>${t.title}</span><span class="tag-mgr-del" onclick="deleteTag('${t.id}')">×</span></div>`).join('');
  document.getElementById('new-tag-title').value='';
  document.getElementById('tag-err').textContent='';
  showToast('标题已添加','success');
}
async function deleteTag(id){
  await sb.from('task_tags').delete().eq('id',id);
  myTags=myTags.filter(t=>t.id!==id);
  const grid=document.getElementById('tag-mgr-grid');
  if(grid) grid.innerHTML=myTags.map(t=>`<div class="tag-mgr-item"><span class="tag-color-dot" style="background:${t.color}"></span><span>${t.title}</span><span class="tag-mgr-del" onclick="deleteTag('${t.id}')">×</span></div>`).join('');
  renderList('done-list',reportData.done);renderList('plan-list',reportData.plan);renderList('todo-list',reportData.todo);
}

// ============ REPORT FORM ============
async function renderReport(){
  const wi=getWeekInfo(currentWeekOffset);
  document.getElementById('week-label').textContent=wi.label;
  document.getElementById('week-range').textContent=wi.range;
  document.getElementById('week-cur-badge').style.display=currentWeekOffset===0?'':'none';
  document.getElementById('save-tip').textContent='加载中...';
  currentReportId=null;

  // Load current week report
  const{data}=await sb.from('reports').select('*').eq('user_id',currentUser.id).eq('week_key',wi.key).single();
  if(data){
    currentReportId=data.id;
    reportData={
      done:data.done||[],
      plan:data.plan||[],
      todo:data.todo||[],
      lastTodos:data.last_todos||[],
      summary:data.summary||''
    };
    document.getElementById('save-tip').textContent=`上次保存：${new Date(data.updated_at).toLocaleString('zh-CN',{hour12:false})}`;
  }else{
    // New week: auto-inherit last week's todos
    const prevWi=getWeekInfo(currentWeekOffset-1);
    const{data:prev}=await sb.from('reports').select('todo').eq('user_id',currentUser.id).eq('week_key',prevWi.key).single();
    const inheritedTodos=(prev?.todo||[]).map(t=>({...t,reviewStatus:'pending'}));
    reportData={done:[],plan:[],todo:[],lastTodos:inheritedTodos,summary:''};
    document.getElementById('save-tip').textContent='尚未填写';
  }
  renderList('done-list',reportData.done);
  renderList('plan-list',reportData.plan);
  renderList('todo-list',reportData.todo);
  renderLastTodos();
}

// ============ LAST TODOS REVIEW ============
function renderLastTodos(){
  const el=document.getElementById('last-todos-list');
  const cnt=document.getElementById('last-todos-count');
  if(!el)return;
  const items=reportData.lastTodos||[];
  if(!items.length){
    el.innerHTML='<div class="review-empty">本周暂无继承自上周的待办项</div>';
    if(cnt)cnt.textContent='';
    return;
  }
  const pending=items.filter(t=>t.reviewStatus==='pending'||!t.reviewStatus).length;
  const done=items.filter(t=>t.reviewStatus==='done').length;
  const carried=items.filter(t=>t.reviewStatus==='carried').length;
  if(cnt)cnt.textContent=`共 ${items.length} 项 · 待处理 ${pending} · 已完成 ${done} · 已延续 ${carried}`;
  el.innerHTML=items.map((t,i)=>{
    const tag=t.tag?myTags.find(tg=>tg.id===t.tag):null;
    const isDone=t.reviewStatus==='done';
    const isCarried=t.reviewStatus==='carried';
    const isPending=!t.reviewStatus||t.reviewStatus==='pending';
    return`<div class="todo-review-item ${isDone?'done-review':isCarried?'carried':''}">
      <div class="todo-review-top">
        <div class="todo-review-text ${isDone?'done-text':''}">${t.text||'（无内容）'}</div>
        <div class="todo-review-actions">
          ${isDone
            ?`<span class="review-status-badge rsb-done">✅ 已完成</span>
               <button class="review-btn review-btn-del" onclick="setLastTodoStatus(${i},'pending')" title="撤销">↩ 撤销</button>`
            :isCarried
            ?`<span class="review-status-badge rsb-carry">↩ 已延续</span>
               <button class="review-btn review-btn-del" onclick="setLastTodoStatus(${i},'pending')" title="撤销">撤销</button>`
            :`<button class="review-btn review-btn-done" onclick="setLastTodoStatus(${i},'done')">✅ 完成</button>
               <button class="review-btn review-btn-carry" onclick="setLastTodoStatus(${i},'carried')">↩ 延续到本周</button>
               <button class="review-btn review-btn-del" onclick="removeLastTodo(${i})">🗑 删除</button>`
          }
        </div>
      </div>
      ${tag?`<div style="margin-top:5px"><span style="display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:8px;font-size:11px;background:${tag.color}18;border:1px solid ${tag.color}44;color:${tag.color}"><span style="width:5px;height:5px;border-radius:50%;background:${tag.color}"></span>${tag.title}</span></div>`:''}
    </div>`;
  }).join('');
}

function setLastTodoStatus(i,status){
  if(!reportData.lastTodos[i])return;
  reportData.lastTodos[i].reviewStatus=status;
  // If carried: add to current week todo list
  if(status==='carried'){
    const t=reportData.lastTodos[i];
    // Check not already in todo list
    const alreadyIn=reportData.todo.some(td=>td.text===t.text&&td._inheritedFrom===t._id);
    if(!alreadyIn){
      reportData.todo.push({text:t.text,status:'todo',tag:t.tag,attachments:[],_inheritedFrom:t._id||t.text});
      renderList('todo-list',reportData.todo);
    }
  }
  renderLastTodos();
}

function removeLastTodo(i){
  reportData.lastTodos.splice(i,1);
  renderLastTodos();
}

function renderList(containerId,items){
  const el=document.getElementById(containerId);if(!el)return;
  el.innerHTML='';
  items.forEach((item,i)=>{
    const sectionKey=containerId.replace('-list','');
    const dropId=`td-${containerId}-${i}`;
    const mpId=`mp-${containerId}-${i}`;
    const tag=item.tag?myTags.find(t=>t.id===item.tag):null;
    const attachCount=(item.attachments||[]).length;
    const div=document.createElement('div');
    div.className='task-item';
    div.innerHTML=`
      <div class="task-item-top">
        <div class="tag-picker-wrap">
          <div class="tag-pill-btn" onclick="toggleTagDrop('${dropId}',${i},'${containerId}')">
            ${tag?`<span class="tag-dot" style="background:${tag.color}"></span><span style="overflow:hidden;text-overflow:ellipsis">${tag.title}</span>`:'<span style="font-size:11px">🏷 标题</span>'}
          </div>
          <div class="tag-dropdown" id="${dropId}"></div>
        </div>
        <select class="status-select" onchange="updateItemField('${containerId}',${i},'status',this.value)">
          <option value="done" ${item.status==='done'?'selected':''}>✅ 已完成</option>
          <option value="in-progress" ${item.status==='in-progress'?'selected':''}>🔄 进行中</option>
          <option value="todo" ${item.status==='todo'?'selected':''}>📌 待办</option>
          <option value="plan" ${item.status==='plan'?'selected':''}>📅 计划中</option>
          <option value="blocked" ${item.status==='blocked'?'selected':''}>🚫 受阻</option>
        </select>
        <button class="del-task-btn" onclick="removeTask('${containerId}',${i})">×</button>
      </div>
      <div style="position:relative">
        <textarea class="task-textarea" id="ta-${containerId}-${i}" placeholder="描述工作内容，输入@可提及成员..."
          oninput="updateItemField('${containerId}',${i},'text',this.value);handleMentionInput(this,'${mpId}')"
        >${item.text||''}</textarea>
        <div class="mention-popup" id="${mpId}"></div>
      </div>
      <div class="task-actions">
        <button class="task-action-btn ${attachCount?'has-data':''}" onclick="openAttachPanel('${sectionKey}',${i})">📎 附件${attachCount?` (${attachCount})`:''}</button>
        <button class="task-action-btn" onclick="toggleComments('${sectionKey}',${i},this)">💬 批注</button>
      </div>
      <div class="attach-chips" id="ac-${sectionKey}-${i}">
        ${(item.attachments||[]).map((a,ai)=>`
          <div class="attach-chip" onclick="previewFile('${a.url}','${a.name}','${a.type||''}')">
            <span>${fileIcon(a.name)}</span><span class="chip-name">${a.name}</span>
            <span class="chip-del" onclick="event.stopPropagation();removeAttachment('${containerId}',${i},${ai})">×</span>
          </div>`).join('')}
      </div>
      <div id="cp-${sectionKey}-${i}" style="display:none"></div>`;
    el.appendChild(div);
    renderTagDropdown(dropId,selectedTag=>{
      items[i].tag=selectedTag.id;renderList(containerId,items);
    });
  });
}

document.addEventListener('click',e=>{
  if(!e.target.closest('.tag-picker-wrap'))document.querySelectorAll('.tag-dropdown.open').forEach(d=>d.classList.remove('open'));
  if(!e.target.closest('.mention-popup')&&!e.target.closest('textarea'))document.querySelectorAll('.mention-popup.open').forEach(p=>p.classList.remove('open'));
});
function toggleTagDrop(dropId,idx,containerId){
  document.querySelectorAll('.tag-dropdown.open').forEach(d=>{if(d.id!==dropId)d.classList.remove('open');});
  document.getElementById(dropId)?.classList.toggle('open');
}
function updateItemField(containerId,i,field,value){
  const map={'done-list':reportData.done,'plan-list':reportData.plan,'todo-list':reportData.todo};
  if(map[containerId])map[containerId][i][field]=value;
}
function addTask(type){
  const map={done:reportData.done,plan:reportData.plan,todo:reportData.todo};
  const smap={done:'done',plan:'plan',todo:'todo'};
  map[type].push({text:'',status:smap[type],tag:null,attachments:[]});
  const imap={done:'done-list',plan:'plan-list',todo:'todo-list'};
  renderList(imap[type],map[type]);
  document.getElementById(imap[type]).lastElementChild?.querySelector('textarea')?.focus();
}
function removeTask(containerId,i){
  const map={'done-list':reportData.done,'plan-list':reportData.plan,'todo-list':reportData.todo};
  map[containerId].splice(i,1);renderList(containerId,map[containerId]);
}
async function saveReport(){
  const wi=getWeekInfo(currentWeekOffset);
  const btn=document.getElementById('save-btn');btn.disabled=true;btn.textContent='保存中...';
  try{
    const payload={
      user_id:currentUser.id,week_key:wi.key,week_label:wi.label,week_range:wi.range,
      done:reportData.done,
      plan:reportData.plan,
      todo:reportData.todo,
      last_todos:reportData.lastTodos,
      summary:'',
      updated_at:new Date().toISOString()
    };
    const{data,error}=await sb.from('reports').upsert(payload,{onConflict:'user_id,week_key'}).select().single();
    if(error){showToast('保存失败：'+error.message,'error');return;}
    currentReportId=data.id;
    document.getElementById('save-tip').textContent=`上次保存：${new Date().toLocaleString('zh-CN',{hour12:false})}`;
    showToast('周报保存成功 ✓','success');
  }finally{btn.disabled=false;btn.textContent='保存周报';}
}

// ============ @MENTION ============
function handleMentionInput(ta,popupId){
  const popup=document.getElementById(popupId);if(!popup)return;
  const val=ta.value,cur=ta.selectionStart;
  const before=val.slice(0,cur);
  const atIdx=before.lastIndexOf('@');
  if(atIdx===-1||(atIdx>0&&/\S/.test(before[atIdx-1]))){popup.classList.remove('open');return;}
  const query=before.slice(atIdx+1).toLowerCase();
  const matches=allUsers.filter(u=>u.id!==currentUser.id&&(u.name.toLowerCase().includes(query)||u.username.toLowerCase().includes(query))).slice(0,6);
  if(!matches.length){popup.classList.remove('open');return;}
  popup.innerHTML=matches.map(u=>`<div class="mention-opt" onclick="insertMention(document.getElementById('${ta.id}'),'${u.name}','${popupId}')"><div class="mention-av">${u.name.slice(0,1)}</div>${u.name}<span style="color:#9ca3af;font-size:11px;margin-left:4px">@${u.username}</span></div>`).join('');
  popup.classList.add('open');
}
function insertMention(ta,name,popupId){
  const cur=ta.selectionStart,val=ta.value,before=val.slice(0,cur),atIdx=before.lastIndexOf('@');
  ta.value=val.slice(0,atIdx)+`@${name} `+val.slice(cur);
  ta.focus();const np=atIdx+name.length+2;ta.setSelectionRange(np,np);
  document.getElementById(popupId)?.classList.remove('open');
  const id=ta.id;const parts=id.split('-');const i=parseInt(parts[parts.length-1]);
  const cid=parts.slice(1,parts.length-1).join('-');
  updateItemField(cid,i,'text',ta.value);
}
async function processMentions(text,reportId){
  if(!text||!reportId)return;
  const matches=[...text.matchAll(/@([^\s@，。！？,!?\n]+)/g)];
  for(const m of matches){
    const u=allUsers.find(u=>u.name===m[1]||u.username===m[1]);
    if(u&&u.id!==currentUser.id){
      await sb.from('notifications').insert({to_user_id:u.id,from_user_id:currentUser.id,type:'mention',content:`${currentUser.name} 在周报中提到了你`,report_id:reportId});
    }
  }
}

// ============ ATTACHMENTS ============
function fileIcon(name){
  const ext=(name||'').split('.').pop().toLowerCase();
  if(['jpg','jpeg','png','gif','webp'].includes(ext))return'🖼';
  if(ext==='pdf')return'📄';if(['doc','docx'].includes(ext))return'📝';
  if(['xls','xlsx'].includes(ext))return'📊';if(['zip','rar'].includes(ext))return'📦';
  return'📎';
}
function openAttachPanel(section,idx){
  const items=section==='done'?reportData.done:section==='plan'?reportData.plan:reportData.todo;
  const item=items[idx];
  showModal('📎 附件管理',`
    <div id="am-list">${renderAttachList(item.attachments||[],section,idx)}</div>
    <div class="attach-drop-zone" onclick="document.getElementById('af-inp').click()">
      📁 点击上传文件（图片/PDF/文档，单文件≤10MB）
      <input type="file" id="af-inp" style="display:none" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.zip" onchange="uploadAttachment('${section}',${idx},this)"/>
    </div>
    <div class="modal-err" id="am-err"></div>`,
    [{label:'关闭',type:'default',fn:'closeModal()'}]);
}
function renderAttachList(attachments,section,idx){
  if(!attachments.length)return'<div style="color:#9ca3af;font-size:13px;padding:8px 0">暂无附件</div>';
  return`<div class="attach-modal-grid">${attachments.map((a,ai)=>`
    <div class="attach-chip" onclick="previewFile('${a.url}','${a.name}','${a.type||''}')">
      <span>${fileIcon(a.name)}</span><span class="chip-name">${a.name}</span>
      <a href="${a.url}" download="${a.name}" target="_blank" style="color:#1677ff;font-size:11px;flex-shrink:0" onclick="event.stopPropagation()">下载</a>
      <span class="chip-del" onclick="event.stopPropagation();removeAttachFromModal('${section}',${idx},${ai})">×</span>
    </div>`).join('')}</div>`;
}
async function uploadAttachment(section,idx,input){
  const file=input.files[0];if(!file)return;
  if(file.size>10*1024*1024){document.getElementById('am-err').textContent='文件不能超过10MB';return;}
  document.getElementById('am-err').textContent='上传中...';
  const path=`${currentUser.id}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._\u4e00-\u9fa5]/g,'_')}`;
  const{data:upData,error:upErr}=await sb.storage.from('attachments').upload(path,file);
  if(upErr){document.getElementById('am-err').textContent='上传失败：'+upErr.message;return;}
  const{data:{publicUrl}}=sb.storage.from('attachments').getPublicUrl(path);
  const items=section==='done'?reportData.done:section==='plan'?reportData.plan:reportData.todo;
  if(!items[idx].attachments)items[idx].attachments=[];
  items[idx].attachments.push({name:file.name,url:publicUrl,type:file.type,path});
  document.getElementById('am-list').innerHTML=renderAttachList(items[idx].attachments,section,idx);
  input.value='';document.getElementById('am-err').textContent='';
  const chips=document.getElementById(`ac-${section}-${idx}`);
  if(chips)chips.innerHTML=items[idx].attachments.map((a,ai)=>`
    <div class="attach-chip" onclick="previewFile('${a.url}','${a.name}','${a.type||''}')">
      <span>${fileIcon(a.name)}</span><span class="chip-name">${a.name}</span>
      <span class="chip-del" onclick="event.stopPropagation();removeAttachment('${section}-list',${idx},${ai})">×</span>
    </div>`).join('');
  showToast('上传成功','success');
}
function removeAttachFromModal(section,idx,ai){
  const items=section==='done'?reportData.done:section==='plan'?reportData.plan:reportData.todo;
  const a=items[idx].attachments[ai];
  if(a.path)sb.storage.from('attachments').remove([a.path]);
  items[idx].attachments.splice(ai,1);
  document.getElementById('am-list').innerHTML=renderAttachList(items[idx].attachments,section,idx);
}
function removeAttachment(containerId,idx,ai){
  const map={'done-list':reportData.done,'plan-list':reportData.plan,'todo-list':reportData.todo};
  const a=map[containerId][idx].attachments[ai];
  if(a.path)sb.storage.from('attachments').remove([a.path]);
  map[containerId][idx].attachments.splice(ai,1);renderList(containerId,map[containerId]);
}
function previewFile(url,name,type){
  const isImg=/\.(jpg|jpeg|png|gif|webp|svg)$/i.test(name)||(type||'').startsWith('image/');
  const isPdf=/\.pdf$/i.test(name)||type==='application/pdf';
  showModal(`${fileIcon(name)} ${name}`,`
    <div style="text-align:center;padding:8px 0">
      ${isImg?`<img src="${url}" style="max-width:100%;max-height:60vh;border-radius:10px;display:block;margin:0 auto"/>`:
        isPdf?`<iframe src="${url}" width="100%" height="480px" style="border:none;border-radius:8px"></iframe>`:
        `<div style="padding:36px;color:#9ca3af">该文件类型不支持预览</div>`}
      <div style="margin-top:12px"><a href="${url}" download="${name}" target="_blank" class="btn btn-default btn-sm">⬇ 下载文件</a></div>
    </div>`,
    [{label:'关闭',type:'default',fn:'closeModal()'}]);
  document.getElementById('modal-box').style.maxWidth='680px';
}

// ============ COMMENTS ============
async function toggleComments(section,idx,btn){
  const panelId=`cp-${section}-${idx}`;
  const panel=document.getElementById(panelId);if(!panel)return;
  if(panel.style.display!=='none'){panel.style.display='none';return;}
  panel.style.display='block';
  panel.innerHTML='<div style="color:#9ca3af;font-size:12px;padding:6px 0">加载中...</div>';
  if(!currentReportId){panel.innerHTML='<div style="font-size:12px;color:#9ca3af">请先保存周报后再添加批注</div>';return;}
  const{data:comments}=await sb.from('comments').select('*').eq('report_id',currentReportId).eq('task_section',section).eq('task_index',String(idx)).order('created_at');
  renderCommentsPanel(panel,comments||[],section,idx);
}
function renderCommentsPanel(panel,comments,section,idx){
  const mpId=`cmp-${section}-${idx}`;
  panel.innerHTML=`
    <div class="comments-panel">
      ${comments.map(c=>{
        const u=allUsers.find(x=>x.id===c.author_id)||{name:'?'};
        const time=new Date(c.created_at).toLocaleString('zh-CN',{hour12:false,month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
        return`<div class="comment-item">
          <div class="comment-av">${u.name.slice(0,1)}</div>
          <div class="comment-bub">
            <div class="comment-hd">
              <span class="comment-author">${u.name}</span>
              <span class="comment-time">${time}</span>
              ${c.author_id===currentUser.id?`<span class="comment-del-btn" onclick="deleteComment('${c.id}','${section}',${idx})">删除</span>`:''}
            </div>
            <div class="comment-text">${highlightMentions(c.content)}</div>
          </div>
        </div>`;
      }).join('')}
      <div class="comment-input-wrap" style="position:relative">
        <textarea class="comment-ta" id="ci-${section}-${idx}" placeholder="添加批注，@成员..." rows="1"
          oninput="handleMentionInput(this,'${mpId}')"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitComment('${section}',${idx})}"></textarea>
        <div class="mention-popup" id="${mpId}"></div>
        <button class="comment-send" onclick="submitComment('${section}',${idx})">发送</button>
      </div>
    </div>`;
}
function highlightMentions(text){
  return(text||'').replace(/@([^\s@，。！？,!?\n]+)/g,'<span class="mention-hl">@$1</span>');
}
async function submitComment(section,idx){
  const input=document.getElementById(`ci-${section}-${idx}`);
  const content=input?.value.trim();if(!content)return;
  if(!currentReportId){showToast('请先保存周报再添加批注','error');return;}
  const{error}=await sb.from('comments').insert({report_id:currentReportId,task_section:section,task_index:String(idx),author_id:currentUser.id,content,mentions:[]});
  if(error){showToast('发送失败','error');return;}
  input.value='';
  const mentions=[...(content||'').matchAll(/@([^\s@，。！？,!?\n]+)/g)];
  for(const m of mentions){
    const u=allUsers.find(u=>u.name===m[1]||u.username===m[1]);
    if(u&&u.id!==currentUser.id)await sb.from('notifications').insert({to_user_id:u.id,from_user_id:currentUser.id,type:'comment',content:`${currentUser.name} 在批注中提到了你`,report_id:currentReportId});
  }
  const{data:comments}=await sb.from('comments').select('*').eq('report_id',currentReportId).eq('task_section',section).eq('task_index',String(idx)).order('created_at');
  const panel=document.getElementById(`cp-${section}-${idx}`);
  if(panel)renderCommentsPanel(panel,comments||[],section,idx);
  showToast('批注已发送','success');
}
async function deleteComment(id,section,idx){
  await sb.from('comments').delete().eq('id',id);
  const{data:comments}=await sb.from('comments').select('*').eq('report_id',currentReportId).eq('task_section',section).eq('task_index',String(idx)).order('created_at');
  const panel=document.getElementById(`cp-${section}-${idx}`);
  if(panel)renderCommentsPanel(panel,comments||[],section,idx);
}

// ============ HISTORY ============

  const el=document.getElementById('history-list');
  el.innerHTML='<div class="empty-box"><div class="ls-spin" style="margin:0 auto"></div></div>';

  if(!data?.length){
    el.innerHTML=`<div class="empty-box"><div class="empty-icon">📄</div><div class="empty-title">暂无周报记录</div><div class="empty-desc">填写并保存本周周报后，历史记录将显示在这里</div></div>`;
    return;
  }
  el.innerHTML=data.map(r=>`
    <div class="history-card" onclick="showDetail('${r.id}','history')">
      <div>
        <div class="history-week">${r.week_label}</div>
        <div class="history-range">${r.week_range}</div>
      </div>
      <div class="history-stats">
        ${r.done?.length?`<div class="stat-pill sp-done">✅ 完成 ${r.done.length}</div>`:''}
        ${r.plan?.length?`<div class="stat-pill sp-progress">📅 计划 ${r.plan.length}</div>`:''}

}

async function showDetail(id,backView){
  const{data:r}=await sb.from('reports').select('*').eq('id',id).single();
  if(!r)return;
  const reporter=allUsers.find(u=>u.id===r.user_id);
  // status maps now in statusCls2/statusLabel2 above
  const statusCls2={'done':'tag-done','in-progress':'tag-progress','todo':'tag-todo','plan':'tag-todo','blocked':'tag-blocked'};
  const statusLabel2={'done':'已完成','in-progress':'进行中','todo':'待办','plan':'计划中','blocked':'受阻'};
  const renderSection=(title,items,sectionKey)=>{
    if(!items?.length)return'';
    return`<div class="report-section">
      <div class="section-label">${title}</div>
      ${items.map((t,i)=>{
        const tag=t.tag?myTags.find(tg=>tg.id===t.tag):null;
        const attachments=t.attachments||[];
        return`<div class="detail-task-item">
          <div class="detail-task-top">
            ${tag?`<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;background:${tag.color}18;border:1px solid ${tag.color}44;color:${tag.color}"><span style="width:6px;height:6px;border-radius:50%;background:${tag.color}"></span>${tag.title}</span>`:''}
            <span class="tag ${statusCls2[t.status]||'tag-todo'}">${statusLabel2[t.status]||t.status||'待办'}</span>
          </div>
          <div class="detail-task-text">${highlightMentions(t.text||'（未填写）')}</div>
          ${attachments.length?`<div class="attach-chips">${attachments.map(a=>`<div class="attach-chip" onclick="previewFile('${a.url}','${a.name}','${a.type||''}')"><span>${fileIcon(a.name)}</span><span class="chip-name">${a.name}</span></div>`).join('')}</div>`:''}
          <button class="task-action-btn" style="margin-top:6px" onclick="toggleDetailComments('${r.id}','${sectionKey}',${i},this)">💬 查看批注</button>
          <div id="dc-${r.id}-${sectionKey}-${i}" style="display:none;margin-top:6px"></div>
        </div>`;
      }).join('')}
    </div>`;
  };
  // Render last_todos review in detail view
  const renderLastTodosDetail=(items)=>{
    if(!items?.length)return'';
    return`<div class="report-section">
      <div class="section-label">🔁 上周待办项回顾</div>
      ${items.map(t=>{
        const badge=t.reviewStatus==='done'?'<span class="review-status-badge rsb-done">✅ 已完成</span>':
          t.reviewStatus==='carried'?'<span class="review-status-badge rsb-carry">↩ 已延续</span>':
          '<span class="review-status-badge" style="background:#f8fafc;color:#9ca3af;border:1px solid #e5e7eb">⏳ 未处理</span>';
        return`<div class="todo-review-item">
          <div class="todo-review-top">
            <div class="todo-review-text ${t.reviewStatus==='done'?'done-text':''}">${t.text||'（无内容）'}</div>
            <div>${badge}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  };
  document.getElementById('detail-content').innerHTML=`
    <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:18px;flex-wrap:wrap">
      <div class="page-title">${r.week_label}</div>
      <span style="color:#9ca3af;font-size:13px">${r.week_range}</span>
      ${reporter?`<span style="color:#6b7280;font-size:13px">· ${reporter.name}</span>`:''}
    </div>
    ${renderLastTodosDetail(r.last_todos)}
    ${renderSection('✅ 本周完成事项',r.done,'done')}
    ${renderSection('📅 下周计划事项',r.plan,'plan')}
    ${renderSection('📌 待办项',r.todo,'todo')}`;
  document.getElementById('detail-back').onclick=()=>showView(backView||'history');
  showView('detail');
}

async function toggleDetailComments(reportId,section,idx,btn){
  const panelId=`dc-${reportId}-${section}-${idx}`;
  const panel=document.getElementById(panelId);if(!panel)return;
  if(panel.style.display!=='none'){panel.style.display='none';return;}
  panel.style.display='block';
  panel.innerHTML='<div style="color:#9ca3af;font-size:12px">加载中...</div>';
  const{data:comments}=await sb.from('comments').select('*').eq('report_id',reportId).eq('task_section',section).eq('task_index',String(idx)).order('created_at');
  const mpId=`dcmp-${reportId}-${section}-${idx}`;
  panel.innerHTML=`
    <div class="comments-panel">
      ${(comments||[]).map(c=>{
        const u=allUsers.find(x=>x.id===c.author_id)||{name:'?'};
        const time=new Date(c.created_at).toLocaleString('zh-CN',{hour12:false,month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
        return`<div class="comment-item">
          <div class="comment-av">${u.name.slice(0,1)}</div>
          <div class="comment-bub">
            <div class="comment-hd"><span class="comment-author">${u.name}</span><span class="comment-time">${time}</span></div>
            <div class="comment-text">${highlightMentions(c.content)}</div>
          </div>
        </div>`;
      }).join('')}
      <div class="comment-input-wrap" style="position:relative">
        <textarea class="comment-ta" id="dci-${reportId}-${section}-${idx}" placeholder="添加批注..." rows="1"
          oninput="handleMentionInput(this,'${mpId}')"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitDetailComment('${reportId}','${section}',${idx})}"></textarea>
        <div class="mention-popup" id="${mpId}"></div>
        <button class="comment-send" onclick="submitDetailComment('${reportId}','${section}',${idx})">发送</button>
      </div>
    </div>`;
}
async function submitDetailComment(reportId,section,idx){
  const input=document.getElementById(`dci-${reportId}-${section}-${idx}`);
  const content=input?.value.trim();if(!content)return;
  const{error}=await sb.from('comments').insert({report_id:reportId,task_section:section,task_index:String(idx),author_id:currentUser.id,content,mentions:[]});
  if(error){showToast('发送失败','error');return;}
  input.value='';
  const mentions=[...(content||'').matchAll(/@([^\s@，。！？,!?\n]+)/g)];
  for(const m of mentions){
    const u=allUsers.find(u=>u.name===m[1]||u.username===m[1]);
    if(u&&u.id!==currentUser.id)await sb.from('notifications').insert({to_user_id:u.id,from_user_id:currentUser.id,type:'comment',content:`${currentUser.name} 在批注中提到了你`,report_id:reportId});
  }
  const{data:rep}=await sb.from('reports').select('user_id').eq('id',reportId).single();
  if(rep&&rep.user_id!==currentUser.id)
    await sb.from('notifications').insert({to_user_id:rep.user_id,from_user_id:currentUser.id,type:'comment',content:`${currentUser.name} 评论了你的周报`,report_id:reportId});
  toggleDetailComments(reportId,section,idx,null);
  setTimeout(()=>toggleDetailComments(reportId,section,idx,null),100);
  showToast('批注已发送','success');
}

// ============ ADMIN ============
async function renderAdminInit(){
  const[{data:reports},{data:users}]=await Promise.all([
    sb.from('reports').select('*').order('week_key',{ascending:false}),
    sb.from('users').select('*').order('name')
  ]);
  allReports=reports||[];allUsers=users||[];
  const weeks=[...new Set(allReports.map(r=>r.week_key))].sort().reverse();
  const sel=document.getElementById('admin-week-sel');
  sel.innerHTML=weeks.map(w=>`<option value="${w}">${w}</option>`).join('');
  renderAdmin();
}
function renderAdmin(){
  const weekKey=document.getElementById('admin-week-sel').value;
  const search=document.getElementById('admin-search').value.trim().toLowerCase();
  const reports=allReports.filter(r=>r.week_key===weekKey);
  const users=allUsers.filter(u=>!search||u.name.toLowerCase().includes(search)||u.username.toLowerCase().includes(search));
  const tbl=document.getElementById('admin-table');
  if(!users.length){tbl.innerHTML=`<tbody><tr><td colspan="6"><div class="empty-box"><div class="empty-title">暂无成员</div></div></td></tr></tbody>`;return;}
  tbl.innerHTML=`<thead><tr><th>成员</th><th>完成</th><th>计划</th><th>待办</th><th>状态</th><th>操作</th></tr></thead>
  <tbody>${users.map(u=>{
    const r=reports.find(x=>x.user_id===u.id);
    if(!r)return`<tr><td><b>${u.name}</b> <span style="color:#9ca3af;font-size:12px">${u.username}</span></td><td>—</td><td>—</td><td>—</td><td><span class="tag tag-unsubmit">未提交</span></td><td>—</td></tr>`;
    return`<tr><td><b>${u.name}</b> <span style="color:#9ca3af;font-size:12px">${u.username}</span></td>
      <td>${r.done?.length||0}</td><td>${r.plan?.length||0}</td><td>${r.todo?.length||0}</td>
      <td><span class="tag tag-submitted">已提交</span></td>
      <td><a onclick="showDetail('${r.id}','admin')">查看</a></td></tr>`;
  }).join('')}</tbody>`;
}

// ============ USERS ============
async function renderUsers(){
  const{data:users}=await sb.from('users').select('*').order('name');
  if(users)allUsers=users;
  const tbl=document.getElementById('users-table');
  tbl.innerHTML=`<thead><tr><th>用户名</th><th>姓名</th><th>角色</th><th>操作</th></tr></thead>
  <tbody>${(allUsers||[]).map(u=>`<tr>
    <td style="font-family:monospace;color:#6b7280">${u.username}</td>
    <td style="font-weight:600">${u.name}</td>
    <td><span class="role-badge ${u.role==='admin'?'role-admin':u.role==='pm'?'role-pm':'role-member'}">${u.role==='admin'?'管理员':u.role==='pm'?'产品经理':u.role}</span></td>
    <td><div style="display:flex;gap:7px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm" onclick="openEditUser('${u.id}','${u.name}','${u.role}')">编辑</button>
      ${u.id!==currentUser.id?`<button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}','${u.name}')">删除</button>`:''}
      ${u.role!=='admin'?`<button class="btn btn-default btn-sm" onclick="setAdmin('${u.id}')">设为管理员</button>`:''}
    </div></td>
  </tr>`).join('')}</tbody>`;
}
function openAddUser(){
  showModal('＋ 添加成员',`
    <div class="mf-group"><label class="mf-label">用户名</label><input class="mf-input" id="m-uname" placeholder="3-12位字母数字下划线"/></div>
    <div class="mf-group"><label class="mf-label">姓名</label><input class="mf-input" id="m-name" placeholder="显示名"/></div>
    <div class="mf-group"><label class="mf-label">初始密码</label><input class="mf-input" type="password" id="m-pass" placeholder="至少6位"/></div>
    <div class="mf-group"><label class="mf-label">角色</label>
      <select class="mf-select" id="m-role"><option value="member">成员</option><option value="pm">产品经理</option><option value="admin">管理员</option></select></div>
    <div class="modal-err" id="m-err"></div>`,
    [{label:'取消',type:'default',fn:'closeModal()'},{label:'添加成员',type:'primary',fn:'saveNewUser()'}]);
}
async function saveNewUser(){
  const u=document.getElementById('m-uname')?.value.trim(),name=document.getElementById('m-name')?.value.trim(),p=document.getElementById('m-pass')?.value,role=document.getElementById('m-role')?.value;
  const err=document.getElementById('m-err');
  if(!u||!/^[a-zA-Z0-9_]{3,12}$/.test(u)){err.textContent='用户名3-12位字母数字下划线';return;}
  if(!name){err.textContent='请填写姓名';return;}
  if(p.length<6){err.textContent='密码至少6位';return;}
  const btn=document.querySelector('#modal-foot .btn-primary');if(btn){btn.disabled=true;btn.textContent='添加中...';}
  try{
    const{data:ex}=await sb.from('users').select('id').eq('username',u).single();
    if(ex){err.textContent='用户名已存在';return;}
    const email=`${u}@wr-internal.local`;
    const{data,error}=await sb.auth.signUp({email,password:p});
    if(error){err.textContent='创建失败：'+error.message;return;}
    await sb.from('users').insert({auth_id:data.user.id,username:u,name,email,role});
    closeModal();renderUsers();showToast('成员添加成功','success');
  }catch(e){err.textContent='操作失败，请重试';}
  finally{if(btn){btn.disabled=false;btn.textContent='添加成员';}}
}
function openEditUser(id,name,role){
  showModal('✏️ 编辑成员',`
    <div class="mf-group"><label class="mf-label">姓名</label><input class="mf-input" id="m-name" value="${name}"/></div>
    <div class="mf-group"><label class="mf-label">角色</label>
      <select class="mf-select" id="m-role">
        <option value="member" ${role==='member'?'selected':''}>成员</option>
        <option value="pm" ${role==='pm'?'selected':''}>产品经理</option>
        <option value="admin" ${role==='admin'?'selected':''}>管理员</option>
      </select></div>
    <div class="modal-err" id="m-err"></div>`,
    [{label:'取消',type:'default',fn:'closeModal()'},{label:'保存',type:'primary',fn:`saveEditUser('${id}')`}]);
}
async function saveEditUser(id){
  const name=document.getElementById('m-name')?.value.trim();
  if(!name){document.getElementById('m-err').textContent='姓名不能为空';return;}
  await sb.from('users').update({name,role:document.getElementById('m-role').value}).eq('id',id);
  const idx=allUsers.findIndex(x=>x.id===id);
  if(idx>=0){allUsers[idx].name=name;allUsers[idx].role=document.getElementById('m-role').value;}
  closeModal();renderUsers();showToast('修改成功','success');
}
async function deleteUser(id,name){
  if(!confirm(`确认删除成员「${name}」？其所有周报也将一并删除。`))return;
  await sb.from('reports').delete().eq('user_id',id);
  await sb.from('users').delete().eq('id',id);
  renderUsers();showToast('已删除');
}
async function setAdmin(id){
  await sb.from('users').update({role:'admin'}).eq('id',id);
  renderUsers();showToast('已设为管理员','success');
}

// ============ NOTIFICATIONS ============
async function checkNotifications(){
  const{data}=await sb.from('notifications').select('id').eq('to_user_id',currentUser.id).eq('is_read',false);
  document.getElementById('notif-badge').style.display=data?.length?'':'none';
}
async function renderNotifications(){
  const el=document.getElementById('notif-list');
  el.innerHTML='<div class="empty-box"><div class="ls-spin" style="margin:0 auto"></div></div>';
  const{data}=await sb.from('notifications').select('*').eq('to_user_id',currentUser.id).order('created_at',{ascending:false}).limit(50);
  await sb.from('notifications').update({is_read:true}).eq('to_user_id',currentUser.id).eq('is_read',false);
  document.getElementById('notif-badge').style.display='none';
  if(!data?.length){el.innerHTML=`<div class="empty-box"><div class="empty-icon">🔔</div><div class="empty-title">暂无消息</div><div class="empty-desc">当有人@你或评论你的周报时，消息会出现在这里</div></div>`;return;}
  el.innerHTML=data.map(n=>{
    const from=allUsers.find(u=>u.id===n.from_user_id)||{name:'系统'};
    const time=new Date(n.created_at).toLocaleString('zh-CN',{hour12:false,month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const icon=n.type==='mention'?'💬':n.type==='comment'?'📝':'🔔';
    return`<div class="notif-item ${n.is_read?'':'unread'}">
      <div class="notif-icon">${icon}</div>
      <div class="notif-body">
        <div class="notif-text"><b>${from.name}</b> ${n.content||''}</div>
        ${n.report_id?`<div class="notif-link" onclick="showDetail('${n.report_id}','notifications')">查看周报 →</div>`:''}
      </div>
      <div class="notif-time">${time}</div>
    </div>`;
  }).join('');
}
async function markAllRead(){
  await sb.from('notifications').update({is_read:true}).eq('to_user_id',currentUser.id);
  document.getElementById('notif-badge').style.display='none';
  renderNotifications();
}

// ============ MODAL ============
function showModal(title,bodyHtml,actions){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=bodyHtml;
  document.getElementById('modal-foot').innerHTML=(actions||[]).map(a=>
    `<button class="btn btn-${a.type||'default'}" onclick="${a.fn}">${a.label}</button>`
  ).join('');
  document.getElementById('modal-box').style.maxWidth='500px';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});

// ============ TOAST ============
function showToast(msg,type='info'){
  const wrap=document.getElementById('toast-wrap');
  const icons={success:'✅',error:'❌',info:'ℹ️'};
  const el=document.createElement('div');
  el.className=`toast-item toast-${type}`;
  el.innerHTML=`<span class="toast-icon">${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(16px)';el.style.transition='all .3s';setTimeout(()=>el.remove(),300);},2500);
}
