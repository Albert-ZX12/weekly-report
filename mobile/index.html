<style>
:root {
  --bg:#f5f4f0;--surface:#fff;--surface2:#f9f8f5;--border:#e2e0d8;--border2:#ccc9be;
  --text:#1a1917;--text2:#5a5751;--text3:#9a9690;
  --accent:#2d6a4f;--accent-light:#e8f5ee;--accent-text:#1b4332;
  --danger:#c0392b;--danger-light:#fdf0ef;
  --info:#1a4480;--info-light:#eff3fb;
  --warn:#7d5a00;--warn-light:#fef9ec;
  --radius:10px;--radius-sm:6px;--shadow:0 1px 4px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:#1b4332;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .4s}
#loading-screen.hide{opacity:0;pointer-events:none}
.loading-logo{font-size:32px;font-weight:700;color:#fff;margin-bottom:10px}
.loading-sub{color:rgba(255,255,255,.6);font-size:14px;margin-bottom:32px}
.loading-bar{width:200px;height:3px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden}
.loading-bar-inner{height:100%;background:#fff;border-radius:2px;animation:loadbar 1.2s ease-in-out infinite}
@keyframes loadbar{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}

/* AUTH */
#auth-screen{display:none;min-height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,#1b4332 0%,#2d6a4f 60%,#40916c 100%)}
#auth-screen.show{display:flex}
.auth-box{background:var(--surface);border-radius:16px;padding:40px 36px;width:360px;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.auth-logo{font-size:28px;font-weight:700;color:var(--accent);margin-bottom:6px}
.auth-sub{color:var(--text3);font-size:13px;margin-bottom:28px}
.auth-box label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px;margin-top:14px}
.auth-box input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;outline:none;background:var(--surface2);transition:border-color .15s}
.auth-box input:focus{border-color:var(--accent);background:#fff}
.auth-tabs{display:flex;margin-bottom:20px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)}
.auth-tab{flex:1;padding:8px;text-align:center;cursor:pointer;font-size:13px;background:var(--surface2);color:var(--text2);border:none;transition:all .15s}
.auth-tab.active{background:var(--accent);color:#fff;font-weight:600}
.auth-err{color:var(--danger);font-size:12px;margin-top:8px;min-height:16px}

/* APP */
#app{display:none;min-height:100vh}
#app.show{display:block}

/* TOP HEADER (mobile) */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--accent);display:flex;align-items:center;padding:env(safe-area-inset-top,0px) 16px 0;height:calc(52px + env(safe-area-inset-top,0px));gap:12px;box-shadow:0 1px 8px rgba(0,0,0,.15)}
.topbar-logo{font-size:15px;font-weight:700;color:#fff;flex:1}
.topbar-spacer{display:none}
.user-badge{display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);font-size:13px;color:#fff}
.user-badge:active{background:rgba(255,255,255,.25)}
.avatar{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.25);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -1px 8px rgba(0,0,0,.06)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;border:none;background:transparent;font-size:10px;color:var(--text3);cursor:pointer;position:relative;gap:3px;min-height:52px;transition:color .15s;-webkit-tap-highlight-color:transparent}
.nav-btn .nav-icon{font-size:20px;line-height:1}
.nav-btn.active{color:var(--accent)}
.nav-btn.active .nav-icon{transform:scale(1.1)}
.notif-dot{position:absolute;top:6px;right:calc(50% - 16px);width:7px;height:7px;background:var(--danger);border-radius:50%;border:2px solid var(--surface)}

/* MAIN CONTENT - account for top + bottom bars */
.main{max-width:960px;margin:0 auto;padding:16px 14px;padding-top:calc(52px + env(safe-area-inset-top,0px) + 16px);padding-bottom:calc(52px + env(safe-area-inset-bottom,0px) + 16px)}

/* Desktop override */
@media(min-width:768px){
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;height:56px;padding:0 24px;box-shadow:var(--shadow)}
  .topbar-logo{color:var(--accent);font-size:16px}
  .user-badge{border-color:var(--border);background:var(--surface2);color:var(--text2)}
  .user-badge:hover{border-color:var(--border2)}
  .avatar{background:var(--accent-light);color:var(--accent-text)}
  .bottom-nav{display:none}
  .desktop-nav{display:flex!important;gap:6px;margin-left:16px}
  .main{padding:28px 20px}
}
.desktop-nav{display:none}

/* VIEWS */
.view{display:none}.view.active{display:block}

/* WEEK NAV */
.week-header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.week-nav{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:16px;transition:all .15s}
.week-nav:hover{border-color:var(--accent);color:var(--accent)}
.week-label{font-size:16px;font-weight:600}
.week-sub{font-size:12px;color:var(--text3)}
.current-badge{background:var(--accent-light);color:var(--accent-text);padding:3px 10px;border-radius:10px;font-size:12px;font-weight:600}

/* REPORT CARD */
.report-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:24px;margin-bottom:16px}
.section-title{font-size:13px;font-weight:600;color:var(--accent-text);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';display:inline-block;width:3px;height:14px;background:var(--accent);border-radius:2px}
.task-list{display:flex;flex-direction:column;gap:10px}

/* TASK ROW - enhanced */
.task-row{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:8px;transition:border-color .15s}
.task-row:hover{border-color:var(--border2)}
.task-row-top{display:flex;align-items:center;gap:8px}
.task-row-body{display:flex;flex-direction:column;gap:6px}

/* Tag selector */
.tag-select-wrap{position:relative;flex-shrink:0}
.tag-pill{display:flex;align-items:center;gap:4px;padding:3px 8px 3px 6px;border-radius:12px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis;transition:all .15s}
.tag-pill:hover{border-color:var(--accent);color:var(--accent)}
.tag-pill .tag-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tag-dropdown{position:absolute;top:calc(100% + 4px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:50;min-width:180px;max-height:240px;overflow-y:auto;display:none}
.tag-dropdown.open{display:block}
.tag-option{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-size:13px;transition:background .1s}
.tag-option:hover{background:var(--surface2)}
.tag-option .tag-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tag-option-add{padding:8px 12px;font-size:12px;color:var(--accent);cursor:pointer;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px}
.tag-option-add:hover{background:var(--accent-light)}

.task-status{padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;cursor:pointer;outline:none;background:var(--surface);color:var(--text2);height:28px}
.task-del-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:16px;border-radius:4px;flex-shrink:0;margin-left:auto}
.task-del-btn:hover{color:var(--danger);background:var(--danger-light)}
.task-content-input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;resize:vertical;min-height:36px;font-family:inherit;outline:none;background:var(--surface);color:var(--text);transition:border-color .15s}
.task-content-input:focus{border-color:var(--accent);background:#fff}

/* task action bar */
.task-actions{display:flex;align-items:center;gap:6px;margin-top:2px}
.task-action-btn{display:flex;align-items:center;gap:3px;padding:3px 8px;border:1px solid var(--border);border-radius:10px;font-size:11px;color:var(--text3);cursor:pointer;background:transparent;transition:all .15s}
.task-action-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.task-action-btn.has-data{color:var(--accent);border-color:var(--accent);background:var(--accent-light)}

/* attachments in task */
.task-attachments{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.attach-chip{display:flex;align-items:center;gap:5px;padding:3px 8px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--text2);cursor:pointer;max-width:180px}
.attach-chip:hover{border-color:var(--accent);color:var(--accent)}
.attach-chip .attach-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attach-del{margin-left:auto;color:var(--text3);font-size:13px;padding-left:4px}
.attach-del:hover{color:var(--danger)}

/* mentions autocomplete */
.mention-popup{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:100;min-width:160px;display:none}
.mention-popup.open{display:block}
.mention-option{padding:8px 12px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px}
.mention-option:hover{background:var(--surface2)}
.mention-avatar{width:22px;height:22px;border-radius:50%;background:var(--accent-light);color:var(--accent-text);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}

/* mention highlight */
.mention-tag{color:var(--accent);font-weight:600;background:var(--accent-light);padding:0 4px;border-radius:4px;font-size:12px}

/* comments panel */
.comments-panel{margin-top:8px;border-top:1px solid var(--border);padding-top:8px}
.comment-item{display:flex;gap:8px;margin-bottom:10px}
.comment-avatar{width:24px;height:24px;border-radius:50%;background:var(--accent-light);color:var(--accent-text);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;margin-top:2px}
.comment-body{flex:1}
.comment-header{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.comment-author{font-size:12px;font-weight:600;color:var(--text)}
.comment-time{font-size:11px;color:var(--text3)}
.comment-text{font-size:13px;color:var(--text2);line-height:1.5;word-break:break-word}
.comment-input-row{display:flex;gap:6px;align-items:flex-start;position:relative}
.comment-input{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;resize:none;min-height:34px;font-family:inherit;outline:none;background:var(--surface2);transition:border-color .15s}
.comment-input:focus{border-color:var(--accent);background:#fff}
.comment-send-btn{padding:6px 12px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;height:34px}
.comment-send-btn:hover{background:var(--accent-text)}
.comment-del{font-size:11px;color:var(--text3);cursor:pointer;margin-left:6px}
.comment-del:hover{color:var(--danger)}

.add-btn{display:flex;align-items:center;gap:4px;padding:7px 12px;border:1px dashed var(--border2);border-radius:var(--radius-sm);background:transparent;cursor:pointer;font-size:13px;color:var(--text3);margin-top:8px;transition:all .15s}
.add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.summary-area{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;min-height:80px;resize:vertical;font-family:inherit;outline:none;background:var(--surface2);color:var(--text);line-height:1.7;transition:border-color .15s;position:relative}
.summary-area:focus{border-color:var(--accent);background:#fff}
.save-bar{display:flex;align-items:center;gap:10px;justify-content:flex-end;margin-top:8px}
.btn-save{padding:9px 22px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-save:hover{background:var(--accent-text)}
.btn-save:disabled{opacity:.6;cursor:not-allowed}
.save-tip{font-size:12px;color:var(--text3)}
.btn-primary{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;margin-top:20px;transition:background .15s}
.btn-primary:hover{background:var(--accent-text)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.badge-done{background:#e8f5ee;color:#1b4332}
.badge-progress{background:#fef9ec;color:#7d5a00}
.badge-todo{background:#eff3fb;color:#1a4480}
.badge-blocked{background:#fdf0ef;color:#7f1d1d}
.badge-unsubmit{background:#fff0e6;color:#7d3c00}

/* HISTORY */
.history-grid{display:flex;flex-direction:column;gap:12px}
.history-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;cursor:pointer;transition:border-color .15s,box-shadow .15s;display:flex;align-items:center;gap:16px}
.history-card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(45,106,79,.08)}
.history-week{font-size:14px;font-weight:600}
.history-dates{font-size:12px;color:var(--text3)}
.history-stats{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
.stat-pill{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:500;border:1px solid}
.stat-done{background:#e8f5ee;color:#1b4332;border-color:#b7e0c8}
.stat-progress{background:#fef9ec;color:#7d5a00;border-color:#fad781}
.stat-todo{background:#eff3fb;color:#1a4480;border-color:#b8cef0}

/* DETAIL */
.back-btn{display:flex;align-items:center;gap:6px;color:var(--text2);cursor:pointer;font-size:13px;margin-bottom:20px;padding:6px 0;border:none;background:transparent}
.back-btn:hover{color:var(--accent)}
.readonly-task{border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;background:var(--surface2)}
.readonly-task-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.readonly-task-text{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:8px;white-space:pre-wrap;word-break:break-word}
.readonly-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;border:1px solid var(--border)}

/* ADMIN */
.admin-filter{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.admin-filter select,.admin-filter input{padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);outline:none;color:var(--text)}
.admin-filter select:focus,.admin-filter input:focus{border-color:var(--accent)}
.admin-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.admin-table table{width:100%;border-collapse:collapse}
.admin-table th{padding:10px 14px;font-size:12px;font-weight:600;text-align:left;background:var(--surface2);color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.4px}
.admin-table td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
.admin-table tr:last-child td{border-bottom:none}
.admin-table tr:hover td{background:var(--surface2)}
.admin-table td a{color:var(--accent);cursor:pointer}
.admin-table td a:hover{text-decoration:underline}

/* USERS */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.page-title{font-size:20px;font-weight:700}
.btn-sm{padding:6px 14px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-weight:500;transition:all .15s}
.btn-outline{border:1px solid var(--border);background:transparent;color:var(--text2)}
.btn-outline:hover{border-color:var(--border2);background:var(--surface2)}
.btn-accent{border:none;background:var(--accent);color:#fff}
.btn-accent:hover{background:var(--accent-text)}
.btn-danger{border:none;background:var(--danger);color:#fff}
.btn-danger:hover{background:#a93226}
.btn-sm:disabled{opacity:.5;cursor:not-allowed}
.role-tag{font-size:11px;padding:2px 7px;border-radius:10px;font-weight:500}
.role-admin{background:#e8f5ee;color:#1b4332}
.role-member{background:#eff3fb;color:#1a4480}

/* TAG MANAGER */
.tag-manager-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.tag-manager-item{display:flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid var(--border);border-radius:20px;font-size:13px;background:var(--surface)}
.tag-color-dot{width:10px;height:10px;border-radius:50%}
.tag-remove{color:var(--text3);cursor:pointer;font-size:14px;line-height:1;margin-left:2px}
.tag-remove:hover{color:var(--danger)}
.color-swatches{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.color-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.color-swatch:hover,.color-swatch.selected{border-color:var(--text)}

/* NOTIFICATIONS */
.notif-list{display:flex;flex-direction:column;gap:8px}
.notif-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;transition:background .15s}
.notif-item.unread{border-color:var(--accent);background:var(--accent-light)}
.notif-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.notif-text{flex:1;font-size:13px;color:var(--text2);line-height:1.5}
.notif-text b{color:var(--text)}
.notif-time{font-size:11px;color:var(--text3);white-space:nowrap}
.notif-action{font-size:12px;color:var(--accent);cursor:pointer;margin-top:3px}
.notif-action:hover{text-decoration:underline}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:12px;padding:28px;width:420px;box-shadow:0 8px 40px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
.modal label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px;margin-top:12px}

  <!-- TOP BAR -->
  <div class="topbar">

    <button class="nav-btn" id="nav-users" style="display:none" onclick="showView('users')">
      <span class="nav-icon">⚙️</span><span>管理</span>

  <div class="main">

    <!-- MY REPORT -->
    <div class="view active" id="view-my-report">
      <div class="week-header">
        <button class="week-nav" onclick="changeWeek(-1)">‹</button>

    <!-- HISTORY -->

          <button class="btn-sm btn-outline" onclick="openTagManager()">🏷 任务标题库</button>

  </div>

<script>
// ============ INIT ============
let sb;
try { sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e) {}

let currentUser = null;
let currentWeekOffset = 0;
let reportData = { done:[], progress:[], todo:[], summary:'' };
let currentReportId = null;
let allUsers = [];
let allReports = [];
let myTags = [];
const TAG_COLORS = ['#2d6a4f','#1a4480','#7d3c00','#7f1d1d','#5b2d8e','#1a6b6b','#7d5a00','#555555'];

// ============ WEEK UTILS ============
function getWeekInfo(offset) {
  const now = new Date(), day = now.getDay()||7;
  const mon = new Date(now);
  mon.setDate(now.getDate()-day+1+offset*7); mon.setHours(0,0,0,0);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const year = mon.getFullYear();
  const weekNum = Math.ceil(((mon-new Date(year,0,1))/86400000+new Date(year,0,1).getDay()+1)/7);
  const fmt = d=>`${d.getMonth()+1}/${d.getDate()}`;
  return { key:mon.toISOString().slice(0,10), label:`${year} 年第 ${weekNum} 周`, range:`${fmt(mon)} ~ ${fmt(sun)}` };
}

// ============ INIT LOAD ============
window.addEventListener('DOMContentLoaded', async () => {
  if (!sb) return;
  const { data:{ session } } = await sb.auth.getSession();
  if (session) { await loadUserProfile(session.user.id); } else { hideLoading(); }
});

async function loadUserProfile(authId) {
  const { data } = await sb.from('users').select('*').eq('auth_id', authId).single();
  if (data) { currentUser = data; enterApp(); } else { hideLoading(); }
}

function hideLoading() {
  const el = document.getElementById('loading-screen');
  el.classList.add('hide');
  setTimeout(()=>el.style.display='none', 400);
  document.getElementById('auth-screen').classList.add('show');
}

// ============ AUTH ============
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0)===(tab==='login')));
  document.getElementById('login-form').style.display = tab==='login'?'':'none';
  document.getElementById('register-form').style.display = tab==='register'?'':'none';
}

async function doLogin() {
  const u=document.getElementById('l-user').value.trim(), p=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err'), btn=document.getElementById('l-btn');
  if (!u||!p){err.textContent='请填写用户名和密码';return;}
  err.textContent=''; btn.disabled=true; btn.textContent='登录中...';
  try {
    const {data:ur} = await sb.from('users').select('email').eq('username',u).single();
    if (!ur){err.textContent='用户名或密码错误';return;}
    const {data,error} = await sb.auth.signInWithPassword({email:ur.email,password:p});
    if (error){err.textContent='用户名或密码错误';return;}
    await loadUserProfile(data.user.id);
  } catch(e){err.textContent='登录失败，请重试';}
  finally{btn.disabled=false;btn.textContent='登 录';}
}

async function doRegister() {
  const u=document.getElementById('r-user').value.trim(), name=document.getElementById('r-name').value.trim(), p=document.getElementById('r-pass').value;
  const err=document.getElementById('r-err'), btn=document.getElementById('r-btn');
  if (!u||!/^[a-zA-Z0-9_]{3,12}$/.test(u)){err.textContent='用户名3-12位字母数字下划线';return;}
  if (!name){err.textContent='请填写姓名';return;}
  if (p.length<6){err.textContent='密码至少6位';return;}
  err.textContent=''; btn.disabled=true; btn.textContent='注册中...';
  try {
    const {data:ex} = await sb.from('users').select('id').eq('username',u).single();
    if (ex){err.textContent='用户名已被使用';return;}
    const email=`${u}@wr-internal.local`;
    const {data,error} = await sb.auth.signUp({email,password:p});
    if (error){err.textContent='注册失败：'+error.message;return;}
    await sb.from('users').insert({auth_id:data.user.id,username:u,name,email,role:'member'});
    showToast('注册成功，请登录'); switchTab('login');
    document.getElementById('l-user').value=u;
  } catch(e){err.textContent='注册出错，请重试';}
  finally{btn.disabled=false;btn.textContent='注 册';}
}

async function doLogout() {
  await sb.auth.signOut(); currentUser=null;
  document.getElementById('app').classList.remove('show');
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').classList.add('show');
}

async function enterApp() {
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('auth-screen').classList.remove('show');
  const app=document.getElementById('app'); app.style.display='block'; app.classList.add('show');
  document.getElementById('top-name').textContent=currentUser.name;
  document.getElementById('top-avatar').textContent=currentUser.name.slice(0,1);
  if (currentUser.role==='admin'){
    ['nav-admin','nav-users','nav-admin-d','nav-users-d'].forEach(id=>{
      const el=document.getElementById(id); if(el) el.style.display='';
    });
  }
  // Load shared data
  const {data:users} = await sb.from('users').select('*').order('name');
  allUsers = users||[];
  await loadMyTags();
  await checkNotifications();
  currentWeekOffset=0;
  showView('my-report');
}

// ============ NAVIGATION ============
function showView(name) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  const navMap={'my-report':'nav-my','history':'nav-history','admin':'nav-admin','users':'nav-users','detail':'nav-history','notifications':'nav-notif'};
  if (navMap[name]) {
    // sync both mobile and desktop navs
    const baseId = navMap[name];
    [baseId, baseId+'-d'].forEach(id=>{ const el=document.getElementById(id); if(el) el.classList.add('active'); });
  }
  // Scroll to top on view change
  window.scrollTo({top:0,behavior:'smooth'});
  if (name==='my-report') renderReport();
  if (name==='history') renderHistory();
  if (name==='admin') renderAdminInit();
  if (name==='users') renderUsers();
  if (name==='notifications') renderNotifications();
}

function changeWeek(d){currentWeekOffset+=d;renderReport();}

// ============ TAGS ============
async function loadMyTags() {
  const {data} = await sb.from('task_tags').select('*').order('title');
  myTags = data||[];
}

function renderTagDropdown(containerId, selectedTag, onSelect) {
  const wrap = document.getElementById(containerId);
  if (!wrap) return;
  wrap.innerHTML = '';
  myTags.forEach(tag => {
    const opt = document.createElement('div');
    opt.className = 'tag-option';
    opt.innerHTML = `<span class="tag-dot" style="background:${tag.color}"></span>${tag.title}`;
    opt.onclick = (e) => { e.stopPropagation(); onSelect(tag); wrap.classList.remove('open'); };
    wrap.appendChild(opt);
  });
  const addOpt = document.createElement('div');
  addOpt.className = 'tag-option-add';
  addOpt.innerHTML = '＋ 管理任务标题库';
  addOpt.onclick = (e) => { e.stopPropagation(); wrap.classList.remove('open'); openTagManager(); };
  wrap.appendChild(addOpt);
}

function openTagManager() {
  const renderItems = () => myTags.map(t=>`
    <div class="tag-manager-item">
      <span class="tag-color-dot" style="background:${t.color}"></span>
      <span>${t.title}</span>
      <span class="tag-remove" onclick="deleteTag('${t.id}')">×</span>
    </div>`).join('');
  document.getElementById('modal-body').innerHTML = `
    <h3>🏷 任务标题库</h3>
    <div class="tag-manager-grid" id="tag-grid">${renderItems()}</div>
    <label>添加新标题</label>
    <input id="new-tag-title" placeholder="如：需求开发、Bug修复、会议沟通..." />
    <label>颜色</label>
    <div class="color-swatches">${TAG_COLORS.map(c=>`<div class="color-swatch" style="background:${c}" data-color="${c}" onclick="selectTagColor(this)"></div>`).join('')}</div>
    <div class="modal-err" id="tag-err"></div>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" onclick="closeModal()">关闭</button>
      <button class="btn-sm btn-accent" onclick="saveNewTag()">添加</button>
    </div>`;
  // default select first color
  document.querySelector('.color-swatch').classList.add('selected');
  openModal();
}

function selectTagColor(el) {
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
  el.classList.add('selected');
}

async function saveNewTag() {
  const title = document.getElementById('new-tag-title').value.trim();
  const color = document.querySelector('.color-swatch.selected')?.dataset.color || TAG_COLORS[0];
  if (!title) { document.getElementById('tag-err').textContent='请填写标题'; return; }
  const {data, error} = await sb.from('task_tags').insert({user_id:currentUser.id, title, color}).select().single();
  if (error) { document.getElementById('tag-err').textContent='保存失败'; return; }
  myTags.push(data);
  document.getElementById('tag-grid').innerHTML = myTags.map(t=>`
    <div class="tag-manager-item">
      <span class="tag-color-dot" style="background:${t.color}"></span>
      <span>${t.title}</span>
      <span class="tag-remove" onclick="deleteTag('${t.id}')">×</span>
    </div>`).join('');
  document.getElementById('new-tag-title').value='';
  document.getElementById('tag-err').textContent='';
  showToast('标题已添加');
}

async function deleteTag(id) {
  await sb.from('task_tags').delete().eq('id',id);
  myTags = myTags.filter(t=>t.id!==id);
  document.getElementById('tag-grid').innerHTML = myTags.map(t=>`
    <div class="tag-manager-item">
      <span class="tag-color-dot" style="background:${t.color}"></span>
      <span>${t.title}</span>
      <span class="tag-remove" onclick="deleteTag('${t.id}')">×</span>
    </div>`).join('');
  // Re-render open report lists to remove deleted tag
  renderList('done-list', reportData.done);
  renderList('progress-list', reportData.progress);
  renderList('todo-list', reportData.todo);
}

// ============ REPORT FORM ============
async function renderReport() {
  const wi = getWeekInfo(currentWeekOffset);
  document.getElementById('week-label').textContent = wi.label;
  document.getElementById('week-range').textContent = wi.range;
  document.getElementById('week-cur-badge').style.display = currentWeekOffset===0?'':'none';
  document.getElementById('save-tip').textContent = '加载中...';
  currentReportId = null;

  const {data} = await sb.from('reports').select('*').eq('user_id',currentUser.id).eq('week_key',wi.key).single();
  if (data) {
    currentReportId = data.id;
    reportData = {done:data.done||[],progress:data.progress||[],todo:data.todo||[],summary:data.summary||''};
    document.getElementById('save-tip').textContent = `上次保存：${new Date(data.updated_at).toLocaleString('zh-CN',{hour12:false})}`;
  } else {
    reportData = {done:[],progress:[],todo:[],summary:''};
    document.getElementById('save-tip').textContent = '尚未填写';
  }
  renderList('done-list', reportData.done);
  renderList('progress-list', reportData.progress);
  renderList('todo-list', reportData.todo);
  document.getElementById('summary-text').value = reportData.summary;
}

function renderList(containerId, items) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  items.forEach((item, i) => {
    const sectionKey = containerId.replace('-list','');
    const row = document.createElement('div');
    row.className = 'task-row';
    const tag = item.tag ? myTags.find(t=>t.id===item.tag)||null : null;
    const dropId = `tag-drop-${containerId}-${i}`;
    const mentionId = `mention-${containerId}-${i}`;
    const attachCount = (item.attachments||[]).length;
    const commentCount = item._commentCount||0;

    row.innerHTML = `
      <div class="task-row-top">
        <div class="tag-select-wrap">
          <div class="tag-pill" onclick="toggleTagDrop('${dropId}',${i},'${containerId}')">
            ${tag ? `<span class="tag-dot" style="background:${tag.color}"></span><span>${tag.title}</span>` : '<span style="font-size:11px">🏷 选择标题</span>'}
          </div>
          <div class="tag-dropdown" id="${dropId}"></div>
        </div>
        <select class="task-status" onchange="updateItemField('${containerId}',${i},'status',this.value)">
          <option value="done" ${item.status==='done'?'selected':''}>✅ 已完成</option>
          <option value="progress" ${item.status==='progress'?'selected':''}>🔄 进行中</option>
          <option value="todo" ${item.status==='todo'?'selected':''}>📌 待办</option>
          <option value="blocked" ${item.status==='blocked'?'selected':''}>🚫 受阻</option>
        </select>
        <button class="task-del-btn" onclick="removeTask('${containerId}',${i})">×</button>
      </div>
      <div class="task-row-body">
        <div style="position:relative">
          <textarea class="task-content-input" placeholder="描述工作内容，输入@可提及成员..." id="input-${containerId}-${i}"
            oninput="updateItemField('${containerId}',${i},'text',this.value);handleMention(this,event,'${mentionId}')"
          >${item.text||''}</textarea>
          <div class="mention-popup" id="${mentionId}"></div>
        </div>
        <div class="task-actions">
          <button class="task-action-btn ${attachCount?'has-data':''}" onclick="openAttachPanel('${sectionKey}',${i})">
            📎 附件${attachCount?` (${attachCount})`:''}
          </button>
          <button class="task-action-btn ${commentCount?'has-data':''}" onclick="toggleComments('${sectionKey}',${i},this)">
            💬 批注${commentCount?` (${commentCount})`:''}
          </button>
        </div>
        <div class="task-attachments" id="attach-chips-${sectionKey}-${i}">
          ${(item.attachments||[]).map((a,ai)=>`
            <div class="attach-chip" onclick="previewFile('${a.url}','${a.name}','${a.type||''}')">
              <span>${fileIcon(a.name)}</span>
              <span class="attach-name">${a.name}</span>
              <span class="attach-del" onclick="event.stopPropagation();removeAttachment('${containerId}',${i},${ai})">×</span>
            </div>`).join('')}
        </div>
        <div class="comments-panel" id="comments-panel-${sectionKey}-${i}" style="display:none"></div>
      </div>`;
    el.appendChild(row);

    // Render tag dropdown lazily
    renderTagDropdown(dropId, tag, (selectedTag) => {
      items[i].tag = selectedTag.id;
      renderList(containerId, items);
    });
  });
}

function fileIcon(name) {
  const ext = (name||'').split('.').pop().toLowerCase();
  if (['jpg','jpeg','png','gif','webp','svg'].includes(ext)) return '🖼';
  if (['pdf'].includes(ext)) return '📄';
  if (['doc','docx'].includes(ext)) return '📝';
  if (['xls','xlsx'].includes(ext)) return '📊';
  if (['zip','rar','7z'].includes(ext)) return '📦';
  return '📎';
}

function toggleTagDrop(dropId, idx, containerId) {
  document.querySelectorAll('.tag-dropdown.open').forEach(d => { if (d.id!==dropId) d.classList.remove('open'); });
  document.getElementById(dropId)?.classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.tag-select-wrap')) document.querySelectorAll('.tag-dropdown.open').forEach(d=>d.classList.remove('open'));
  if (!e.target.closest('.mention-popup') && !e.target.closest('textarea')) document.querySelectorAll('.mention-popup.open').forEach(p=>p.classList.remove('open'));
});

function updateItemField(containerId, i, field, value) {
  const map = {'done-list':reportData.done,'progress-list':reportData.progress,'todo-list':reportData.todo};
  if (map[containerId]) map[containerId][i][field] = value;
}

function addTask(type) {
  const map = {done:reportData.done,progress:reportData.progress,todo:reportData.todo};
  const statusMap = {done:'done',progress:'progress',todo:'todo'};
  map[type].push({text:'',status:statusMap[type],tag:null,attachments:[]});
  const idMap = {done:'done-list',progress:'progress-list',todo:'todo-list'};
  renderList(idMap[type], map[type]);
  document.getElementById(idMap[type]).lastElementChild.querySelector('textarea').focus();
}

function removeTask(containerId, i) {
  const map = {'done-list':reportData.done,'progress-list':reportData.progress,'todo-list':reportData.todo};
  map[containerId].splice(i,1);
  renderList(containerId, map[containerId]);
}

async function saveReport() {
  reportData.summary = document.getElementById('summary-text').value;
  const wi = getWeekInfo(currentWeekOffset);
  const btn = document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='保存中...';
  try {
    const payload = {
      user_id:currentUser.id, week_key:wi.key, week_label:wi.label, week_range:wi.range,
      done:reportData.done, progress:reportData.progress, todo:reportData.todo,
      summary:reportData.summary, updated_at:new Date().toISOString()
    };
    const {data, error} = await sb.from('reports').upsert(payload,{onConflict:'user_id,week_key'}).select().single();
    if (error){showToast('保存失败：'+error.message,true);return;}
    currentReportId = data.id;
    document.getElementById('save-tip').textContent = `上次保存：${new Date().toLocaleString('zh-CN',{hour12:false})}`;
    // Send mention notifications from summary
    await processMentions(reportData.summary, data.id);
    showToast('周报保存成功 ✓');
  } finally {btn.disabled=false;btn.textContent='保存周报';}
}

// ============ @MENTION ============
function handleMention(textarea, event, popupId) {
  const popup = document.getElementById(popupId);
  if (!popup) return;
  const val = textarea.value;
  const cursor = textarea.selectionStart;
  const before = val.slice(0, cursor);
  const atIdx = before.lastIndexOf('@');
  if (atIdx === -1 || (atIdx > 0 && /\S/.test(before[atIdx-1]))) { popup.classList.remove('open'); return; }
  const query = before.slice(atIdx+1).toLowerCase();
  const matches = allUsers.filter(u => u.id!==currentUser.id && (u.name.toLowerCase().includes(query) || u.username.toLowerCase().includes(query))).slice(0,6);
  if (!matches.length) { popup.classList.remove('open'); return; }
  popup.innerHTML = matches.map(u=>`
    <div class="mention-option" onclick="insertMention(document.getElementById('${textarea.id}'),'${u.name}','${popupId}')">
      <div class="mention-avatar">${u.name.slice(0,1)}</div>
      <span>${u.name}</span><span style="color:var(--text3);font-size:12px;margin-left:4px">@${u.username}</span>
    </div>`).join('');
  popup.classList.add('open');
}

function insertMention(textarea, name, popupId) {
  const cursor = textarea.selectionStart;
  const val = textarea.value;
  const before = val.slice(0, cursor);
  const atIdx = before.lastIndexOf('@');
  textarea.value = val.slice(0,atIdx) + `@${name} ` + val.slice(cursor);
  textarea.focus();
  const newPos = atIdx + name.length + 2;
  textarea.setSelectionRange(newPos, newPos);
  document.getElementById(popupId).classList.remove('open');
  // Update data
  const id = textarea.id; // input-{containerId}-{i}
  const parts = id.split('-');
  const i = parseInt(parts[parts.length-1]);
  const containerId = parts.slice(1, parts.length-1).join('-');
  updateItemField(containerId, i, 'text', textarea.value);
}

async function processMentions(text, reportId) {
  if (!text || !reportId) return;
  const matches = [...text.matchAll(/@([^\s@，。！？,!?]+)/g)];
  for (const m of matches) {
    const name = m[1];
    const user = allUsers.find(u=>u.name===name||u.username===name);
    if (user && user.id!==currentUser.id) {
      await sb.from('notifications').insert({
        to_user_id:user.id, from_user_id:currentUser.id,
        type:'mention', content:`${currentUser.name} 在周报中提到了你`,
        report_id:reportId
      });
    }
  }
}

// ============ ATTACHMENTS ============
function openAttachPanel(section, idx) {
  const items = section==='done'?reportData.done:section==='progress'?reportData.progress:reportData.todo;
  const item = items[idx];
  document.getElementById('modal-body').innerHTML = `
    <h3>📎 附件管理</h3>
    <div id="attach-list-modal">${renderAttachList(item.attachments||[],section,idx)}</div>
    <label style="margin-top:16px">上传文件（图片/文档，单文件≤10MB）</label>
    <input type="file" id="attach-file-input" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.zip" style="margin-top:6px"/>
    <div class="modal-err" id="attach-err"></div>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" onclick="closeModal()">关闭</button>
      <button class="btn-sm btn-accent" id="attach-upload-btn" onclick="uploadAttachment('${section}',${idx})">上传</button>
    </div>`;
  openModal();
}

function renderAttachList(attachments, section, idx) {
  if (!attachments.length) return '<div style="color:var(--text3);font-size:13px;padding:8px 0">暂无附件</div>';
  return attachments.map((a,ai)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:16px">${fileIcon(a.name)}</span>
      <span style="flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.name}</span>
      <a style="color:var(--accent);font-size:12px;cursor:pointer" onclick="previewFile('${a.url}','${a.name}','${a.type||''}')">预览</a>
      <a href="${a.url}" download="${a.name}" style="color:var(--info);font-size:12px" target="_blank">下载</a>
      <span style="color:var(--danger);cursor:pointer;font-size:12px" onclick="removeAttachFromModal('${section}',${idx},${ai})">删除</span>
    </div>`).join('');
}

async function uploadAttachment(section, idx) {
  const fileInput = document.getElementById('attach-file-input');
  const file = fileInput.files[0];
  if (!file) { document.getElementById('attach-err').textContent='请选择文件'; return; }
  if (file.size > 10*1024*1024) { document.getElementById('attach-err').textContent='文件不能超过10MB'; return; }
  const btn = document.getElementById('attach-upload-btn');
  btn.disabled=true; btn.textContent='上传中...';
  try {
    const ext = file.name.split('.').pop();
    const path = `${currentUser.id}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
    const {data:upData, error:upErr} = await sb.storage.from('attachments').upload(path, file);
    if (upErr) { document.getElementById('attach-err').textContent='上传失败：'+upErr.message; return; }
    const {data:{publicUrl}} = sb.storage.from('attachments').getPublicUrl(path);
    const items = section==='done'?reportData.done:section==='progress'?reportData.progress:reportData.todo;
    if (!items[idx].attachments) items[idx].attachments=[];
    items[idx].attachments.push({name:file.name, url:publicUrl, type:file.type, path});
    // Refresh modal
    document.getElementById('attach-list-modal').innerHTML = renderAttachList(items[idx].attachments, section, idx);
    fileInput.value='';
    // Refresh chips in task row
    const listId = section+'-list';
    const chips = document.getElementById(`attach-chips-${section}-${idx}`);
    if (chips) chips.innerHTML = items[idx].attachments.map((a,ai)=>`
      <div class="attach-chip" onclick="previewFile('${a.url}','${a.name}','${a.type||''}')">
        <span>${fileIcon(a.name)}</span><span class="attach-name">${a.name}</span>
        <span class="attach-del" onclick="event.stopPropagation();removeAttachment('${listId}',${idx},${ai})">×</span>
      </div>`).join('');
    // Update action button
    const actionBtns = document.querySelectorAll(`#${section}-list .task-row`)[idx]?.querySelectorAll('.task-action-btn');
    if (actionBtns?.[0]) { actionBtns[0].classList.add('has-data'); actionBtns[0].textContent=`📎 附件 (${items[idx].attachments.length})`; }
    showToast('上传成功');
  } catch(e){ document.getElementById('attach-err').textContent='上传出错，请重试'; }
  finally{ btn.disabled=false; btn.textContent='上传'; }
}

function removeAttachFromModal(section, idx, ai) {
  const items = section==='done'?reportData.done:section==='progress'?reportData.progress:reportData.todo;
  const a = items[idx].attachments[ai];
  if (a.path) sb.storage.from('attachments').remove([a.path]);
  items[idx].attachments.splice(ai,1);
  document.getElementById('attach-list-modal').innerHTML = renderAttachList(items[idx].attachments,section,idx);
}

function removeAttachment(containerId, idx, ai) {
  const map={'done-list':reportData.done,'progress-list':reportData.progress,'todo-list':reportData.todo};
  const items = map[containerId];
  const a = items[idx].attachments[ai];
  if (a.path) sb.storage.from('attachments').remove([a.path]);
  items[idx].attachments.splice(ai,1);
  renderList(containerId, items);
}

function previewFile(url, name, type) {
  const isImage = /\.(jpg|jpeg|png|gif|webp|svg)$/i.test(name) || (type||'').startsWith('image/');
  const isPdf = /\.pdf$/i.test(name) || type==='application/pdf';
  document.getElementById('modal-body').innerHTML = `
    <h3>${fileIcon(name)} ${name}</h3>
    <div class="preview-box">
      ${isImage ? `<img class="preview-img" src="${url}" alt="${name}"/>` :
        isPdf ? `<iframe src="${url}" width="100%" height="400px" style="border:none;border-radius:8px"></iframe>` :
        `<div style="padding:32px;color:var(--text3)">该文件类型不支持预览</div>`}
      <div style="margin-top:12px">
        <a href="${url}" download="${name}" target="_blank" style="color:var(--accent);font-size:13px">⬇ 下载文件</a>
      </div>
    </div>
    <div class="modal-actions"><button class="btn-sm btn-outline" onclick="closeModal()">关闭</button></div>`;
  openModal();
}

// ============ COMMENTS ============
async function toggleComments(section, idx, btn) {
  const panelId = `comments-panel-${section}-${idx}`;
  const panel = document.getElementById(panelId);
  if (!panel) return;
  const isOpen = panel.style.display !== 'none';
  if (isOpen) { panel.style.display='none'; return; }
  panel.style.display='block';
  panel.innerHTML='<div style="color:var(--text3);font-size:12px;padding:4px 0">加载中...</div>';
  if (!currentReportId) { panel.innerHTML='<div style="color:var(--text3);font-size:12px">请先保存周报后再添加批注</div>'; return; }
  const {data:comments} = await sb.from('comments')
    .select('*').eq('report_id',currentReportId).eq('task_section',section).eq('task_index',String(idx))
    .order('created_at');
  renderCommentsPanel(panel, comments||[], section, idx);
}

function renderCommentsPanel(panel, comments, section, idx) {
  const inputId = `comment-input-${section}-${idx}`;
  const mentionId = `comment-mention-${section}-${idx}`;
  panel.innerHTML = `
    ${comments.map(c=>{
      const u = allUsers.find(u=>u.id===c.author_id)||{name:'?'};
      const time = new Date(c.created_at).toLocaleString('zh-CN',{hour12:false,month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
      return `<div class="comment-item">
        <div class="comment-avatar">${u.name.slice(0,1)}</div>
        <div class="comment-body">
          <div class="comment-header">
            <span class="comment-author">${u.name}</span>
            <span class="comment-time">${time}</span>
            ${c.author_id===currentUser.id?`<span class="comment-del" onclick="deleteComment('${c.id}','${section}',${idx})">删除</span>`:''}
          </div>
          <div class="comment-text">${highlightMentions(c.content)}</div>
        </div>
      </div>`;
    }).join('')}
    <div class="comment-input-row" style="position:relative">
      <textarea class="comment-input" id="${inputId}" placeholder="添加批注，可@成员..." rows="1"
        oninput="handleMention(this,event,'${mentionId}')"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitComment('${section}',${idx})}"></textarea>
      <div class="mention-popup" id="${mentionId}"></div>
      <button class="comment-send-btn" onclick="submitComment('${section}',${idx})">发送</button>
    </div>`;
}

function highlightMentions(text) {
  return (text||'').replace(/@([^\s@，。！？,!?]+)/g, '<span class="mention-tag">@$1</span>');
}

async function submitComment(section, idx) {
  const inputId = `comment-input-${section}-${idx}`;
  const input = document.getElementById(inputId);
  if (!input) return;
  const content = input.value.trim();
  if (!content) return;
  if (!currentReportId) { showToast('请先保存周报再添加批注',true); return; }
  const {data, error} = await sb.from('comments').insert({
    report_id:currentReportId, task_section:section, task_index:String(idx),
    author_id:currentUser.id, content, mentions:[]
  }).select().single();
  if (error) { showToast('发送失败',true); return; }
  input.value='';
  // Send mention notifications
  const mentions = [...content.matchAll(/@([^\s@，。！？,!?]+)/g)];
  for (const m of mentions) {
    const u = allUsers.find(u=>u.name===m[1]||u.username===m[1]);
    if (u && u.id!==currentUser.id) {
      await sb.from('notifications').insert({
        to_user_id:u.id, from_user_id:currentUser.id,
        type:'comment', content:`${currentUser.name} 在批注中提到了你`,
        report_id:currentReportId
      });
    }
  }
  // Refresh panel
  const panelId = `comments-panel-${section}-${idx}`;
  const panel = document.getElementById(panelId);
  const {data:comments} = await sb.from('comments')
    .select('*').eq('report_id',currentReportId).eq('task_section',section).eq('task_index',String(idx))
    .order('created_at');
  renderCommentsPanel(panel, comments||[], section, idx);
  // Update button badge
  const rows = document.querySelectorAll(`#${section}-list .task-row`);
  const actionBtn = rows[idx]?.querySelectorAll('.task-action-btn')[1];
  if (actionBtn) { actionBtn.classList.add('has-data'); actionBtn.textContent=`💬 批注 (${(comments||[]).length})`; }
}

async function deleteComment(id, section, idx) {
  await sb.from('comments').delete().eq('id',id);
  const panelId = `comments-panel-${section}-${idx}`;
  const panel = document.getElementById(panelId);
  const {data:comments} = await sb.from('comments')
    .select('*').eq('report_id',currentReportId).eq('task_section',section).eq('task_index',String(idx))
    .order('created_at');
  renderCommentsPanel(panel, comments||[], section, idx);
}

              ${fileIcon(a.name)}<span class="attach-name">${a.name}</span>
            </div>`).join('')}</div>`:''}
          <div style="margin-top:6px">
            <button class="task-action-btn" onclick="toggleDetailComments('${r.id}','${sectionKey}',${i},this)">💬 查看批注</button>
          </div>
          <div id="detail-comments-${r.id}-${sectionKey}-${i}" style="display:none;margin-top:6px"></div>
        </div>`;
      }).join('')}
    </div>`;

  document.getElementById('detail-content').innerHTML = `
    <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:20px;flex-wrap:wrap">

async function toggleDetailComments(reportId, section, idx, btn) {

  if (panel.style.display!=='none'){panel.style.display='none';return;}
  panel.style.display='block';
  panel.innerHTML='<div style="color:var(--text3);font-size:12px">加载中...</div>';
  const {data:comments} = await sb.from('comments')
    .select('*').eq('report_id',reportId).eq('task_section',section).eq('task_index',String(idx))
    .order('created_at');
  // For detail view: show comments + input
  const canComment = true;
  const inputId = `detail-ci-${reportId}-${section}-${idx}`;
  const mentionId = `detail-cm-${reportId}-${section}-${idx}`;
  panel.innerHTML = `
    <div class="comments-panel" style="margin-top:0;border-top:none;padding-top:0">
      ${(comments||[]).map(c=>{
        const u=allUsers.find(u=>u.id===c.author_id)||{name:'?'};
        const time=new Date(c.created_at).toLocaleString('zh-CN',{hour12:false,month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
        return `<div class="comment-item">
          <div class="comment-avatar">${u.name.slice(0,1)}</div>
          <div class="comment-body">
            <div class="comment-header"><span class="comment-author">${u.name}</span><span class="comment-time">${time}</span></div>
            <div class="comment-text">${highlightMentions(c.content)}</div>
          </div>
        </div>`;
      }).join('')}
      <div class="comment-input-row" style="position:relative">
        <textarea class="comment-input" id="${inputId}" placeholder="添加批注..." rows="1"
          oninput="handleMention(this,event,'${mentionId}')"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitDetailComment('${reportId}','${section}',${idx})}"></textarea>
        <div class="mention-popup" id="${mentionId}"></div>
        <button class="comment-send-btn" onclick="submitDetailComment('${reportId}','${section}',${idx})">发送</button>
      </div>
    </div>`;
}

async function submitDetailComment(reportId, section, idx) {
  const inputId = `detail-ci-${reportId}-${section}-${idx}`;
  const input = document.getElementById(inputId);
  const content = input?.value.trim();
  if (!content) return;
  const {error} = await sb.from('comments').insert({
    report_id:reportId, task_section:section, task_index:String(idx),
    author_id:currentUser.id, content, mentions:[]
  });
  if (error){showToast('发送失败',true);return;}
  input.value='';
  // Notify mentions
  const mentions=[...(content||'').matchAll(/@([^\s@，。！？,!?]+)/g)];
  for(const m of mentions){
    const u=allUsers.find(u=>u.name===m[1]||u.username===m[1]);
    if(u&&u.id!==currentUser.id) await sb.from('notifications').insert({to_user_id:u.id,from_user_id:currentUser.id,type:'comment',content:`${currentUser.name} 在批注中提到了你`,report_id:reportId});
  }
  // Get report owner, notify if commenter is not owner
  const {data:rep}=await sb.from('reports').select('user_id').eq('id',reportId).single();
  if(rep&&rep.user_id!==currentUser.id){
    await sb.from('notifications').insert({to_user_id:rep.user_id,from_user_id:currentUser.id,type:'comment',content:`${currentUser.name} 评论了你的周报`,report_id:reportId});
  }
  // Re-render panel
  toggleDetailComments(reportId, section, idx, null);
  setTimeout(()=>toggleDetailComments(reportId, section, idx, null),100);
  showToast('批注已发送');
}

// ============ ADMIN ============
async function renderAdminInit() {
  const {data:reports}=await sb.from('reports').select('*').order('week_key',{ascending:false});
  const {data:users}=await sb.from('users').select('*').order('name');
  allReports=reports||[]; allUsers=users||[];
  const weeks=[...new Set(allReports.map(r=>r.week_key))].sort().reverse();
  const sel=document.getElementById('admin-week-sel');
  sel.innerHTML=weeks.map(w=>`<option value="${w}">${w}</option>`).join('');
  renderAdmin();
}

function renderAdmin() {
  const weekKey=document.getElementById('admin-week-sel').value;
  const search=document.getElementById('admin-search').value.trim().toLowerCase();
  const reports=allReports.filter(r=>r.week_key===weekKey);
  const users=allUsers.filter(u=>!search||u.name.toLowerCase().includes(search)||u.username.toLowerCase().includes(search));
  const wrap=document.getElementById('admin-table-wrap');
  if(!users.length){wrap.innerHTML=`<div class="empty-state"><div class="empty-title">暂无成员</div></div>`;return;}
  wrap.innerHTML=`<table>
    <thead><tr><th>成员</th><th>完成</th><th>进行中</th><th>计划</th><th>状态</th><th>操作</th></tr></thead>
    <tbody>${users.map(u=>{
      const r=reports.find(x=>x.user_id===u.id);
      if(!r)return`<tr><td><b>${u.name}</b> <span style="color:var(--text3);font-size:12px">${u.username}</span></td><td>-</td><td>-</td><td>-</td><td><span class="badge badge-unsubmit">未提交</span></td><td>-</td></tr>`;
      return`<tr><td><b>${u.name}</b> <span style="color:var(--text3);font-size:12px">${u.username}</span></td>
        <td>${r.done?.length||0}</td><td>${r.progress?.length||0}</td><td>${r.todo?.length||0}</td>
        <td><span class="badge badge-done">已提交</span></td>
        <td><a onclick="showDetail('${r.id}','admin')">查看</a></td></tr>`;
    }).join('')}</tbody></table>`;
}

// ============ USERS ============
async function renderUsers() {
  const wrap=document.getElementById('users-table-wrap');
  wrap.innerHTML='<div class="empty-state"><div class="save-tip">加载中...</div></div>';
  const {data:users}=await sb.from('users').select('*').order('name');
  allUsers=users||[];
  if(!users?.length){wrap.innerHTML=`<div class="empty-state"><div class="empty-title">暂无成员</div></div>`;return;}
  wrap.innerHTML=`<table>
    <thead><tr><th>用户名</th><th>姓名</th><th>角色</th><th>操作</th></tr></thead>
    <tbody>${users.map(u=>`<tr>
      <td>${u.username}</td><td>${u.name}</td>
      <td><span class="role-tag ${u.role==='admin'?'role-admin':'role-member'}">${u.role==='admin'?'管理员':'成员'}</span></td>
      <td style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn-sm btn-outline" onclick="openEditUser('${u.id}','${u.name}')">编辑姓名</button>
        ${u.id!==currentUser.id?`<button class="btn-sm btn-danger" onclick="deleteUser('${u.id}','${u.name}')">删除</button>`:''}
        ${u.role!=='admin'?`<button class="btn-sm btn-accent" onclick="setAdmin('${u.id}')">设为管理员</button>`:''}
      </td>
    </tr>`).join('')}</tbody></table>`;
}

function openAddUser(){
  document.getElementById('modal-body').innerHTML=`
    <h3>添加成员</h3>
    <label>用户名</label><input id="m-uname" placeholder="3-12位字母数字下划线"/>
    <label>姓名</label><input id="m-name" placeholder="显示名"/>
    <label>初始密码</label><input type="password" id="m-pass" placeholder="至少6位"/>
    <label>角色</label><select id="m-role"><option value="member">成员</option><option value="admin">管理员</option></select>
    <div class="modal-err" id="m-err"></div>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" onclick="closeModal()">取消</button>
      <button class="btn-sm btn-accent" id="m-confirm" onclick="saveNewUser()">确认添加</button>
    </div>`;
  openModal();
}

async function saveNewUser(){
  const u=document.getElementById('m-uname').value.trim(),name=document.getElementById('m-name').value.trim(),p=document.getElementById('m-pass').value,role=document.getElementById('m-role').value;
  const err=document.getElementById('m-err'),btn=document.getElementById('m-confirm');
  if(!u||!/^[a-zA-Z0-9_]{3,12}$/.test(u)){err.textContent='用户名3-12位字母数字下划线';return;}
  if(!name){err.textContent='请填写姓名';return;}
  if(p.length<6){err.textContent='密码至少6位';return;}
  err.textContent='';btn.disabled=true;btn.textContent='添加中...';
  try{
    const{data:ex}=await sb.from('users').select('id').eq('username',u).single();
    if(ex){err.textContent='用户名已存在';return;}
    const email=`${u}@wr-internal.local`;
    const{data,error}=await sb.auth.signUp({email,password:p});
    if(error){err.textContent='创建失败：'+error.message;return;}
    await sb.from('users').insert({auth_id:data.user.id,username:u,name,email,role});
    closeModal();renderUsers();showToast('成员添加成功');
  }catch(e){err.textContent='操作失败，请重试';}
  finally{btn.disabled=false;btn.textContent='确认添加';}
}

function openEditUser(id,name){
  document.getElementById('modal-body').innerHTML=`
    <h3>编辑姓名</h3>
    <label>新姓名</label><input id="m-name" value="${name}"/>
    <div class="modal-err" id="m-err"></div>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" onclick="closeModal()">取消</button>
      <button class="btn-sm btn-accent" id="m-confirm" onclick="saveEditUser('${id}')">保存</button>
    </div>`;
  openModal();
}

async function saveEditUser(id){
  const name=document.getElementById('m-name').value.trim();
  if(!name){document.getElementById('m-err').textContent='姓名不能为空';return;}
  document.getElementById('m-confirm').disabled=true;
  await sb.from('users').update({name}).eq('id',id);
  closeModal();renderUsers();showToast('修改成功');
}

async function deleteUser(id,name){
  if(!confirm(`确认删除成员「${name}」？其所有周报也将一并删除。`))return;
  await sb.from('reports').delete().eq('user_id',id);
  await sb.from('users').delete().eq('id',id);
  renderUsers();showToast('已删除');
}

async function setAdmin(id){
  await sb.from('users').update({role:'admin'}).eq('id',id);
  renderUsers();showToast('已设为管理员');
}

// ============ NOTIFICATIONS ============
async function checkNotifications(){
  const {data}=await sb.from('notifications').select('id').eq('to_user_id',currentUser.id).eq('is_read',false);
  const show = data?.length ? '' : 'none';
  ['notif-dot','notif-dot-d'].forEach(id=>{ const el=document.getElementById(id); if(el) el.style.display=show; });
}

async function renderNotifications(){
  const el=document.getElementById('notif-list');
  el.innerHTML='<div class="empty-state"><div class="save-tip">加载中...</div></div>';
  const {data}=await sb.from('notifications').select('*').eq('to_user_id',currentUser.id).order('created_at',{ascending:false}).limit(50);
  // Mark all read
  await sb.from('notifications').update({is_read:true}).eq('to_user_id',currentUser.id).eq('is_read',false);
  document.getElementById('notif-dot').style.display='none';
  if(!data?.length){el.innerHTML=`<div class="empty-state"><div class="empty-title">暂无消息</div><div>当有人@你或评论你的周报时，消息会显示在这里</div></div>`;return;}
  el.innerHTML=data.map(n=>{
    const from=allUsers.find(u=>u.id===n.from_user_id)||{name:'系统'};
    const time=new Date(n.created_at).toLocaleString('zh-CN',{hour12:false,month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const icon=n.type==='mention'?'💬':n.type==='comment'?'📝':'🔔';
    return`<div class="notif-item ${n.is_read?'':'unread'}">
      <div class="notif-icon">${icon}</div>
      <div style="flex:1">
        <div class="notif-text"><b>${from.name}</b> ${n.content||''}</div>
        ${n.report_id?`<div class="notif-action" onclick="showDetail('${n.report_id}','notifications')">查看周报 →</div>`:''}
      </div>
      <div class="notif-time">${time}</div>
    </div>`;
  }).join('');
}

async function markAllRead(){
  await sb.from('notifications').update({is_read:true}).eq('to_user_id',currentUser.id);
  ['notif-dot','notif-dot-d'].forEach(id=>{ const el=document.getElementById(id); if(el) el.style.display='none'; });
  renderNotifications();
}

// ============ MODAL / TOAST ============
function openModal(){document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
let toastTimer;
function showToast(msg,isError){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(isError?' error':'');t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

// ============ PWA ============
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  const banner = document.getElementById('pwa-banner');
  if (banner) banner.style.display='flex';
});
document.getElementById('pwa-install-btn')?.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const {outcome} = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('pwa-banner').style.display='none';
});
window.addEventListener('appinstalled', () => {
  document.getElementById('pwa-banner').style.display='none';
});

// iOS Safari install hint
if (/iphone|ipad|ipod/i.test(navigator.userAgent) && !navigator.standalone) {
  setTimeout(()=>{
    const banner = document.getElementById('pwa-banner');
    if (banner) {
      banner.style.display='flex';
      banner.querySelector('#pwa-install-btn').textContent='如何安装';
      banner.querySelector('#pwa-install-btn').onclick = () => {
        showToast('点击底部分享按钮 → 添加到主屏幕');
        banner.style.display='none';
      };
    }
  }, 3000);
}
